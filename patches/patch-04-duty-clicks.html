<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>04 - Duty Clicks</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../lib/effect-ui.css">
    <script src="../lib/pedalboard-effects.js"></script>
    <script src="../lib/effect-ui.js"></script>
    <script type="module" src="../lib/phonebook-features.js"></script>
</head>
<body>
    <div class="patch-page">
        <header class="patch-header">
            <a href="../index.html" class="back-link">&larr; Back</a>
            <div class="patch-info">
                <h1>04 - Duty Clicks</h1>
                <p>Nested duty cycles creating complex rhythmic click patterns</p>
            </div>
        </header>

        <main class="patch-content">
            <div class="visualizer-container">
                <canvas id="visualizer"></canvas>
            </div>

            <div class="controls">
                <button class="play-btn" id="playBtn">&#9654;</button>
            </div>

            <div class="param-controls">
                <div class="param-group">
                    <label>Tempo</label>
                    <input type="range" id="tempo" min="0.5" max="2" value="1" step="0.05">
                    <span class="param-value" id="tempoVal">1.00</span>
                </div>
                <div class="param-group">
                    <label>Click Vol</label>
                    <input type="range" id="clickVol" min="0.1" max="1" value="0.5" step="0.05">
                    <span class="param-value" id="clickVolVal">0.50</span>
                </div>
                <div class="param-group">
                    <label>Density</label>
                    <input type="range" id="density" min="0.5" max="2" value="1" step="0.1">
                    <span class="param-value" id="densityVal">1.00</span>
                </div>
            </div>

            <div class="code-block">
                <code>x=(1..8);y=scramble(8/x);z=y/.x y;d={|d,a|Duty.ar(d,0,Dseq(a,inf))};play{d.(d.(0.16,z*.x z)/4e3,z)/5-d.(d.(0.04,x*2)/8e2,[0,1])/3!2}</code>
            </div>

            <p class="status" id="status">Click play to start</p>

            <div id="pedalboard-container" class="pedalboard-container"></div>
        </main>

        <nav class="nav-links">
            <a href="patch-03-allpass-comb.html">&larr; Previous</a>
            <a href="patch-05-melodic-sequence.html">Next &rarr;</a>
        </nav>
    </div>

    <script>
        const processorCode = `
class DutyClicksProcessor extends AudioWorkletProcessor {
    constructor() {
        super();
        this.tempo = 1;
        this.clickVol = 0.5;
        this.density = 1;
        this.timer1 = 0;
        this.idx1 = 0;
        this.timer2 = 0;
        this.idx2 = 0;
        this.env1 = 0;
        this.env2L = 0;
        this.env2R = 0;
        this.durs1 = [2400, 4800, 3840, 7200, 2880, 5760, 3360, 4320];
        this.durs2 = [1440, 2880, 1920, 3840, 2400, 3360, 1680, 2640];
        this.port.onmessage = (e) => {
            if (e.data.tempo !== undefined) this.tempo = e.data.tempo;
            if (e.data.clickVol !== undefined) this.clickVol = e.data.clickVol;
            if (e.data.density !== undefined) this.density = e.data.density;
        };
    }
    process(inputs, outputs, parameters) {
        const output = outputs[0];
        const left = output[0];
        const right = output[1];
        if (!left) return true;
        for (let s = 0; s < left.length; s++) {
            this.timer1++;
            if (this.timer1 >= this.durs1[this.idx1 % 8] / this.tempo / this.density) {
                this.timer1 = 0;
                this.idx1++;
                this.env1 = 1.0;
            }
            this.timer2++;
            if (this.timer2 >= this.durs2[this.idx2 % 8] / this.tempo / this.density) {
                this.timer2 = 0;
                this.idx2++;
                if (this.idx2 % 2 === 0) this.env2L = 1.0;
                else this.env2R = 1.0;
            }
            const noise = Math.random() * 2 - 1;
            const out1 = noise * this.env1;
            const out2L = noise * this.env2L;
            const out2R = noise * this.env2R;
            this.env1 *= 0.992;
            this.env2L *= 0.985;
            this.env2R *= 0.985;
            left[s] = Math.tanh((out1 + out2L) * this.clickVol * 3);
            if (right) right[s] = Math.tanh((out1 + out2R) * this.clickVol * 3);
        }
        return true;
    }
}
registerProcessor('duty-clicks-processor', DutyClicksProcessor);
`;

        let audioContext = null;
        let workletNode = null;
        let analyser = null;
        let isPlaying = false;
        let pedalboard = null;

        let stickyHeader = null;
        let modMatrixUI = null;
        let midiLearn = null;
        let modMatrix = null;
        const playBtn = document.getElementById('playBtn');
        const status = document.getElementById('status');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        const params = ['tempo', 'clickVol', 'density'];
        params.forEach(param => {
            const input = document.getElementById(param);
            const display = document.getElementById(param + 'Val');
            input.addEventListener('input', () => {
                const val = parseFloat(input.value);
                display.textContent = val.toFixed(2);
                if (workletNode) {
                    workletNode.port.postMessage({ [param]: val });
                }
            });
        });

        
        // Wait for phonebook features to load (or timeout after 2 seconds)
        const featuresLoaded = new Promise(resolve => {
            if (typeof StickyHeader !== 'undefined') {
                resolve(true);
            } else {
                window.addEventListener('phonebook-features-loaded', () => resolve(true), { once: true });
                setTimeout(() => resolve(false), 2000);
            }
        });

        async function initAudio() {
            // Wait for features to load first
            await featuresLoaded;

            audioContext = new AudioContext();
            const blob = new Blob([processorCode], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            await audioContext.audioWorklet.addModule(url);
            URL.revokeObjectURL(url);

            workletNode = new AudioWorkletNode(audioContext, 'duty-clicks-processor');

            // Initialize pedalboard and route audio through it
            pedalboard = new PedalboardUI(
                document.getElementById('pedalboard-container'),
                audioContext
            );
            const fxNode = await pedalboard.init();
            pedalboard.connect(workletNode);
            fxNode.connect(audioContext.destination);

            // Initialize features if phonebook-features.js is loaded
            if (typeof StickyHeader !== 'undefined') {
                stickyHeader = new StickyHeader({
                    patchName: '04-duty-clicks',
                    patchId: 'patch-04-duty-clicks'
                });
                await stickyHeader.init();
                await stickyHeader.initRecorder(audioContext, fxNode || workletNode, audioContext.destination);
            }

            if (typeof getMidiLearn !== 'undefined') {
                midiLearn = await getMidiLearn('patch-04-duty-clicks');
            }

            if (typeof getModulationMatrix !== 'undefined') {
                modMatrix = getModulationMatrix();
                modMatrixUI = new ModMatrixUI(
                    document.querySelector('.patch-content'),
                    { modMatrix: modMatrix }
                );
                modMatrixUI.init();
            }

            // Auto-register all sliders for MIDI Learn and Mod Matrix
            if (typeof autoRegisterControls !== 'undefined') {
                await autoRegisterControls({
                    patchId: 'patch-04-duty-clicks',
                    prefix: 'clicks',
                    modMatrixUI: modMatrixUI
                });
            }

            analyser = audioContext.createAnalyser();
            analyser.fftSize = 512;
            fxNode.connect(analyser);

            params.forEach(param => {
                const val = parseFloat(document.getElementById(param).value);
                workletNode.port.postMessage({ [param]: val });
            });
        }

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        let history = [];
        function drawVisualizer() {
            if (!analyser) return;
            const rect = canvas.parentElement.getBoundingClientRect();
            const width = rect.width;
            const height = rect.height;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteTimeDomainData(dataArray);

            // Calculate RMS
            let sum = 0;
            for (let i = 0; i < bufferLength; i++) {
                const v = (dataArray[i] - 128) / 128;
                sum += v * v;
            }
            const rms = Math.sqrt(sum / bufferLength);

            history.push(rms);
            if (history.length > width) history.shift();

            ctx.fillStyle = '#12121a';
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = '#6366f1';
            for (let i = 0; i < history.length; i++) {
                const h = history[i] * height * 3;
                ctx.fillRect(i, height / 2 - h / 2, 1, h);
            }

            if (isPlaying) requestAnimationFrame(drawVisualizer);
        }

        playBtn.addEventListener('click', async () => {
            if (!audioContext) {
                await initAudio();
                resizeCanvas();
            }

            if (isPlaying) {
                audioContext.suspend();
                playBtn.innerHTML = '&#9654;';
                playBtn.classList.remove('playing');
                status.textContent = 'Paused';
                status.classList.remove('active');
                isPlaying = false;
                if (modMatrix) modMatrix.stop();
            } else {
                await audioContext.resume();
                playBtn.innerHTML = '&#10074;&#10074;';
                playBtn.classList.add('playing');
                status.textContent = 'Playing';
                status.classList.add('active');
                isPlaying = true;
                if (modMatrix) modMatrix.start();
                drawVisualizer();
            }
        });

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
