    <style>
        .section-label {
            font-size: 0.7em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5em;
            display: block;
        }
        .param-controls {
            border-bottom: 1px solid #222;
            padding-bottom: 1em;
            margin-bottom: 1em;
        }
        .param-row {
            display: flex;
            gap: 1em;
            flex-wrap: wrap;
        }

            flex: 1;
            min-width: 70px;
        }
        .sample-visualizer {
            max-width: 800px;
            width: 100%;
            margin: 1rem auto;
        }

            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            padding: 0.75rem;

            background: #222;

            color: #ccc;

            font-size: 0.8em;

            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 1em;

            <div id="pedalboard-container" class="pedalboard-container"></div>

    <script>
        const processorCode = `
// ============================================================================
// SLEW LIMITER
// ============================================================================
class SlewLimiter {
    constructor(time, sr) {
        this.sr = sr;
        this.setTime(time);
        this.value = 1;
    }

    setTime(time) {
        this.rate = 1 / (time * this.sr + 1);
    }

    process(target) {
        const diff = target - this.value;
        this.value += diff * this.rate;
        return this.value;
    }
}

// ============================================================================
// PINGABLE SCALED RANDOM
// ============================================================================
class PingableScaledRandom {
    constructor() {
        this.value = 0.5;
        this.target = 0.5;
        this.min = 0;
        this.max = 1;
    }

    ping() {
        this.target = this.min + Math.random() * (this.max - this.min);
    }

    setRange(min, max) {
        this.min = min;
        this.max = max;
    }

    process(slew) {
        this.value += (this.target - this.value) * slew;
        return this.value;
    }
}

// ============================================================================
// CLOCKED RANDOM GATE
// ============================================================================
class ClockedRandomGate {
    constructor(sr) {
        this.sr = sr;
        this.phase = 0;
        this.rate = 4;
        this.mul = 1;
        this.div = 1;
        this.prob = 0.5;
        this.gateOpen = false;
    }

    setRate(r) { this.rate = Math.max(0.1, r); }
    setMul(m) { this.mul = Math.max(1, m); }
    setDiv(d) { this.div = Math.max(1, d); }
    setProb(p) { this.prob = p; }

    process() {
        const effectiveRate = (this.rate * this.mul) / this.div;
        this.phase += effectiveRate / this.sr;

        let triggered = false;
        if (this.phase >= 1) {
            this.phase -= 1;
            if (Math.random() < this.prob) {
                triggered = true;
                this.gateOpen = true;
            }
        }

        // Gate duration (half period)
        if (this.phase > 0.5) {
            this.gateOpen = false;
        }

        return triggered;
    }
}

// ============================================================================
// CPR COMPRESSOR (simplified)
// ============================================================================
class CPR {
    constructor(sr) {
        this.sr = sr;
        this.envelope = 0;
        this.threshold = 0.5;
        this.ratio = 4;
        this.attack = 0.01;
        this.release = 0.1;
    }

    setAmount(amt) {
        this.threshold = 1 - amt * 0.8;
        this.ratio = 1 + amt * 8;
    }

    process(input) {
        const abs = Math.abs(input);

        // Envelope follower
        if (abs > this.envelope) {
            this.envelope += (abs - this.envelope) / (this.attack * this.sr + 1);
        } else {
            this.envelope += (abs - this.envelope) / (this.release * this.sr + 1);
        }

        // Compression
        let gain = 1;
        if (this.envelope > this.threshold) {
            const over = this.envelope - this.threshold;
            const compressed = this.threshold + over / this.ratio;
            gain = compressed / this.envelope;
        }

        return input * gain;
    }
}

// ============================================================================
// HYPER SCALE PROCESSOR
// ============================================================================
class HyperScaleProcessor extends AudioWorkletProcessor {
    constructor() {
        super();
        this.sr = sampleRate;
        this.playing = false;
        this.samples = [];
        this.sampleNames = [];

        // Current sample playback
        this.currentSample = null;
        this.samplePosition = 0;
        this.sampleSpeed = 1;
        this.currentSampleIndex = -1;

        // Two clocked random gates (main and random)
        this.gate1 = new ClockedRandomGate(this.sr);
        this.gate2 = new ClockedRandomGate(this.sr);

        // Pingable scaled random for pitch variation
        this.pitchRandom = new PingableScaledRandom();
        this.pitchSlew = new SlewLimiter(0.024, this.sr);

        // CPR compressor
        this.compressorL = new CPR(this.sr);
        this.compressorR = new CPR(this.sr);

        // Envelope for sample playback
        this.env = 1;
        this.envRelease = 0.1;

        // Parameters
        this.params = {
            trigRate: 4,
            prob: 0.7,
            mul: 1,
            div: 1,
            rprob: 0.5,
            rmul: 2,
            rdiv: 1,
            divProb: 0.3,
            hypersc: 1,
            sp: 1,
            pitchRand: 0.2,
            slew: 0.024,
            vol: 0.7,
            compress: 0.5
        };

        this.port.onmessage = (e) => {
            if (e.data.type === 'start') this.playing = true;
            if (e.data.type === 'stop') this.playing = false;
            if (e.data.type === 'param') {
                this.params[e.data.name] = e.data.value;
            }
            if (e.data.type === 'loadSamples') {
                this.samples = e.data.samples;
                this.sampleNames = e.data.names || [];
            }
            if (e.data.type === 'clearSamples') {
                this.samples = [];
                this.sampleNames = [];
                this.currentSample = null;
            }
        };
    }

    triggerSample() {
        if (this.samples.length === 0) return;

        // Random sample selection
        const idx = Math.floor(Math.random() * this.samples.length);
        this.currentSample = this.samples[idx];
        this.currentSampleIndex = idx;
        this.samplePosition = 0;
        this.env = 1;

        // Ping the random pitch
        this.pitchRandom.ping();

        this.port.postMessage({
            type: 'sampleTriggered',
            index: idx
        });
    }

    process(inputs, outputs, parameters) {
        const output = outputs[0];
        const outL = output[0];
        const outR = output[1];

        if (!this.playing) {
            outL.fill(0);
            outR.fill(0);
            return true;
        }

        // Update gate parameters
        this.gate1.setRate(this.params.trigRate);
        this.gate1.setProb(this.params.prob);
        this.gate1.setMul(this.params.mul);
        this.gate1.setDiv(this.params.div);

        this.gate2.setRate(this.params.trigRate * this.params.rmul / this.params.rdiv);
        this.gate2.setProb(this.params.rprob);
        this.gate2.setMul(this.params.rmul);
        this.gate2.setDiv(this.params.rdiv);

        // Pitch random range based on hypersc and pitchRand
        const pitchRange = this.params.pitchRand * this.params.hypersc;
        this.pitchRandom.setRange(1 - pitchRange, 1 + pitchRange);
        this.pitchSlew.setTime(this.params.slew);

        // Compressor amount
        this.compressorL.setAmount(this.params.compress);
        this.compressorR.setAmount(this.params.compress);

        let gate1State = false;
        let gate2State = false;

        for (let i = 0; i < outL.length; i++) {
            // Process gates
            const trig1 = this.gate1.process();
            const trig2 = this.gate2.process();

            gate1State = this.gate1.gateOpen;
            gate2State = this.gate2.gateOpen;

            // Division probability: sometimes use gate2 instead of gate1
            let triggered = false;
            if (trig1) {
                if (Math.random() > this.params.divProb) {
                    triggered = true;
                }
            }
            if (trig2 && Math.random() < this.params.divProb) {
                triggered = true;
            }

            if (triggered) {
                this.triggerSample();
            }

            // Get smoothed pitch from random
            const pitchMod = this.pitchSlew.process(this.pitchRandom.value);
            this.sampleSpeed = this.params.sp * this.params.hypersc * pitchMod;

            // Sample playback
            let sampleOut = 0;
            if (this.currentSample) {
                const idx = Math.floor(this.samplePosition);
                if (idx >= 0 && idx < this.currentSample.length - 1) {
                    const frac = this.samplePosition - idx;
                    const s0 = this.currentSample[idx];
                    const s1 = this.currentSample[idx + 1];
                    sampleOut = s0 + frac * (s1 - s0);
                    this.samplePosition += this.sampleSpeed;
                } else {
                    // Sample finished
                    this.env *= 0.999;
                }
            }

            // Apply envelope
            sampleOut *= this.env;

            // Stereo output with slight variation
            let sigL = sampleOut;
            let sigR = sampleOut;

            // Compress
            sigL = this.compressorL.process(sigL);
            sigR = this.compressorR.process(sigR);

            // Volume
            sigL *= this.params.vol;
            sigR *= this.params.vol;

            outL[i] = Math.tanh(sigL);
            outR[i] = Math.tanh(sigR);
        }

        // Send state
        this.port.postMessage({
            type: 'state',
            sampleCount: this.samples.length,
            playingIndex: this.currentSampleIndex,
            pitchMod: this.pitchSlew.value,
            gate1: gate1State,
            gate2: gate2State
        });

        return true;
    }
}

registerProcessor('hyper-scale-processor', HyperScaleProcessor);
`;

        let audioContext, workletNode, pedalboard;
        let isPlaying = false;
        let sampleNames = [];

        let stickyHeader = null;
        let modMatrixUI = null;
        let midiLearn = null;
        let modMatrix = null;
        const playBtn = document.getElementById('playBtn');

        // Generate sample path list (243 samples from Dr. Dre Kit)
        function generateSamplePaths() {
            const paths = [];
            // Basic drums
            ['BD0010', 'BD0025', 'BD0050', 'BD0075', 'CH'].forEach(n => paths.push(n + '.wav'));
            ['Clank10', 'Clank6'].forEach(n => paths.push(n + '.wav'));
            ['Clap10', 'Clap11', 'Clap15', 'Clap18', 'Clap21', 'Clap23', 'Clap26', 'Clap28', 'Clap29', 'Clap31', 'Clap33', 'Clap8', 'Clap9'].forEach(n => paths.push(n + '.wav'));
            ['Click5', 'Click7'].forEach(n => paths.push(n + '.wav'));
            ['Crunch2', 'Crunch5', 'Crunch7', 'Crunch8', 'Crunch9'].forEach(n => paths.push(n + '.wav'));

            // DRE samples (6 banks x 32 each)
            ['1AB', '1CD', '2AB', '2CD', '3AB', '3CD'].forEach(bank => {
                for (let i = 1; i <= 32; i++) {
                    paths.push(`DRE3-${bank} ${String(i).padStart(3, '0')}.wav`);
                }
            });

            // Delay and misc
            ['DelayClick', 'DelayScrape', 'DelaySlap', 'DelaySnap', 'DelaySnap29', 'DelaySnap31', 'DelaySnap32', 'DelaySnap34', 'DelaySnap35', 'DelayTink13', 'DelayTink4'].forEach(n => paths.push(n + '.wav'));
            paths.push('HT50.wav');
            ['Knock11', 'Knock12', 'Knock2', 'Knock25', 'Knock28', 'Knock29', 'Knock30', 'Knock8'].forEach(n => paths.push(n + '.wav'));
            paths.push('SD1010.wav', 'Smack.wav');
            ['Wack13', 'Wack38'].forEach(n => paths.push(n + '.wav'));

            return paths;
        }

        function buildSampleGrid(names) {
            const grid = document.getElementById('sampleGrid');
            grid.innerHTML = names.map((name, i) =>
                `<div class="sample-slot" data-index="${i}" title="${name}">${i + 1}</div>`
            ).join('');
            document.getElementById('sampleCount').textContent = names.length;
        }

        function updatePlayingSample(index) {
            document.querySelectorAll('.sample-slot').forEach((slot, i) => {
                slot.classList.toggle('playing', i === index);
            });
            const nowPlaying = document.getElementById('nowPlaying');
            if (index >= 0 && sampleNames[index]) {
                nowPlaying.textContent = `▶ ${sampleNames[index]}`;
                nowPlaying.style.color = '#f39c12';
            }
            document.getElementById('playingIndex').textContent = index >= 0 ? index + 1 : '--';
        }

        async function loadDefaultSamples() {
            const samples = [];
            const names = [];
            const basePath = '../samples/hyperscale/hyper-scale/';
            const paths = generateSamplePaths();

            let loaded = 0;
            const nowPlaying = document.getElementById('nowPlaying');

            for (const file of paths) {
                try {
                    const response = await fetch(basePath + encodeURIComponent(file));
                    if (response.ok) {
                        const buffer = await response.arrayBuffer();
                        const audioBuffer = await audioContext.decodeAudioData(buffer);
                        samples.push(audioBuffer.getChannelData(0));
                        names.push(file.replace('.wav', ''));
                        loaded++;
                        if (loaded % 20 === 0) {
                            nowPlaying.textContent = `Loading... ${loaded}/${paths.length}`;
                        }
                    }
                } catch (err) {
                    // Skip failed loads silently
                }
            }

            if (samples.length > 0) {
                sampleNames = names;
                workletNode.port.postMessage({
                    type: 'loadSamples',
                    samples: samples,
                    names: names
                });
                buildSampleGrid(names);
                nowPlaying.textContent = `Loaded ${samples.length} samples`;
            }
        }

        
        // Wait for phonebook features to load (or timeout after 2 seconds)
        const featuresLoaded = new Promise(resolve => {
            if (typeof StickyHeader !== 'undefined') {
                resolve(true);
            } else {
                window.addEventListener('phonebook-features-loaded', () => resolve(true), { once: true });
                setTimeout(() => resolve(false), 2000);
            }
        });

        async function initAudio() {
            // Wait for features to load first
            await featuresLoaded;

            audioContext = new AudioContext({ sampleRate: 48000 });
            const blob = new Blob([processorCode], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            await audioContext.audioWorklet.addModule(url);
            workletNode = new AudioWorkletNode(audioContext, 'hyper-scale-processor', {
                numberOfInputs: 0,
                numberOfOutputs: 1,
                outputChannelCount: [2]
            });

            // Setup pedalboard
            const container = document.getElementById('pedalboard-container');
            pedalboard = new PedalboardUI(container, audioContext);
            const fxNode = await pedalboard.init();
            pedalboard.connect(workletNode);
            fxNode.connect(audioContext.destination);

            // Initialize features if phonebook-features.js is loaded
            if (typeof StickyHeader !== 'undefined') {
                stickyHeader = new StickyHeader({
                    patchName: 'hyper-scale-er-301-hyperscale',
                    patchId: 'er-301-patches-hyperscale-hyper-scale'
                });
                await stickyHeader.init();
                await stickyHeader.initRecorder(audioContext, fxNode || workletNode, audioContext.destination);
            }

            if (typeof getMidiLearn !== 'undefined') {
                midiLearn = await getMidiLearn('er-301-patches-hyperscale-hyper-scale');
            }

            if (typeof getModulationMatrix !== 'undefined') {
                modMatrix = getModulationMatrix();
                modMatrixUI = new ModMatrixUI(
                    document.querySelector('.patch-content'),
                    { modMatrix: modMatrix }
                );
                modMatrixUI.init();
            }

            // Auto-register all sliders for MIDI Learn and Mod Matrix
            if (typeof autoRegisterControls !== 'undefined') {
                await autoRegisterControls({
                    patchId: 'er-301-patches-hyperscale-hyper-scale',
                    prefix: 'scale',
                    modMatrixUI: modMatrixUI
                });
            }

            // Handle messages
            workletNode.port.onmessage = (e) => {
                if (e.data.type === 'sampleTriggered') {
                    updatePlayingSample(e.data.index);
                }
                if (e.data.type === 'state') {
                    document.getElementById('pitchDisplay').textContent = e.data.pitchMod.toFixed(2);
                    document.getElementById('gate1').classList.toggle('active', e.data.gate1);
                    document.getElementById('gate2').classList.toggle('active', e.data.gate2);
                }
            };

            // Visualizer
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;
            fxNode.connect(analyser);
            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteTimeDomainData(dataArray);
                ctx.fillStyle = '#0a0a14';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#f39c12';
                ctx.beginPath();
                const sliceWidth = canvas.width / dataArray.length;
                let x = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    const v = dataArray[i] / 128.0;
                    const y = v * canvas.height / 2;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                    x += sliceWidth;
                }
                ctx.stroke();
            }
            draw();

            // Load default samples
            await loadDefaultSamples();
        }

        playBtn.onclick = async () => {
            if (!audioContext) await initAudio();
            if (audioContext.state === 'suspended') await audioContext.resume();

            isPlaying = !isPlaying;
            playBtn.textContent = isPlaying ? '\u23F9' : '\u25B6';
            workletNode.port.postMessage({ type: isPlaying ? 'start' : 'stop' });
        };

        // Import samples
        document.getElementById('importBtn').onclick = () => {
            document.getElementById('sampleInput').click();
        };

        document.getElementById('sampleInput').onchange = async (e) => {
            if (!audioContext) await initAudio();
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            const samples = [];
            const names = [];

            for (const file of files) {
                try {
                    const buffer = await file.arrayBuffer();
                    const audioBuffer = await audioContext.decodeAudioData(buffer);
                    samples.push(audioBuffer.getChannelData(0));
                    names.push(file.name.replace(/\.[^/.]+$/, ''));
                } catch (err) {
                    console.error('Error loading:', file.name);
                }
            }

            if (samples.length > 0) {
                sampleNames = names;
                workletNode.port.postMessage({
                    type: 'loadSamples',
                    samples: samples,
                    names: names
                });
                buildSampleGrid(names);
                document.getElementById('nowPlaying').textContent = `Loaded ${samples.length} custom samples`;
            }
        };

        // Clear samples
        document.getElementById('clearBtn').onclick = () => {
            if (workletNode) {
                workletNode.port.postMessage({ type: 'clearSamples' });
                sampleNames = [];
                document.getElementById('sampleGrid').innerHTML = '';
                document.getElementById('sampleCount').textContent = '0';
                document.getElementById('nowPlaying').textContent = 'Samples cleared';
                document.getElementById('playingIndex').textContent = '--';
            }
        };

        // Parameter controls
        const params = ['trigRate', 'prob', 'mul', 'div', 'rprob', 'rmul', 'rdiv', 'divProb',
                        'hypersc', 'sp', 'pitchRand', 'slew', 'vol', 'compress'];

        params.forEach(name => {
            const input = document.getElementById(name);
            const display = document.getElementById(name + 'Val');
            if (input && display) {
                input.oninput = () => {
                    const val = parseFloat(input.value);
                    if (name === 'slew') {
                        display.textContent = val.toFixed(3);
                    } else {
                        display.textContent = Number.isInteger(val) ? val : val.toFixed(2);
                    }
                    if (workletNode) {
                        workletNode.port.postMessage({ type: 'param', name, value: val });
                    }
                };
            }
        });

        // Info panel
        if (typeof ER301InfoPanel !== 'undefined') {
            new ER301InfoPanel(document.body, {
                title: 'hyper scale',
                author: 'mudlogger',
                origin: 'ER-301 Hyperscale Units',
                description: 'The main Hyperscale percussion unit featuring 243 samples from the Dr. Dre Drum Kit Vol 3. Uses dual Clocked Random Gates for polyrhythmic triggering, Pingable Scaled Random for pitch variation with slew, and CPR compression. This is the flagship generative drum machine of the Hyperscale collection.',
                controls: [
                    { name: 'Trig Rate', range: '0.5-16 Hz', description: 'Main clock rate for triggering' },
                    { name: 'Prob', range: '0-1', description: 'Probability of main gate triggering' },
                    { name: 'Mul / Div', range: '1-8', description: 'Clock multiplier and divider' },
                    { name: 'R.Prob / R.Mul / R.Div', description: 'Secondary random gate parameters' },
                    { name: 'Div Prob', range: '0-1', description: 'Probability of using random gate instead of main' },
                    { name: 'Scale', range: '0.25-4x', description: 'Overall pitch/time scaling' },
                    { name: 'Speed', range: '0.25-2x', description: 'Playback speed multiplier' },
                    { name: 'Pitch Rand', range: '0-1', description: 'Amount of random pitch variation' },
                    { name: 'Slew', range: '0-0.5s', description: 'Pitch change smoothing time' },
                    { name: 'Compress', range: '0-1', description: 'CPR compression amount' }
                ],
                tips: [
                    'Use high Prob values for dense, rapid-fire percussion',
                    'Div Prob blends between main and random gate timing',
                    'Scale affects both pitch and implied tempo feel',
                    'Higher Slew values create pitch glide effects',
                    'Combine different Mul/Div ratios for polyrhythms',
                    'Import your own samples to create custom kits',
                    'The 243 samples include kicks, snares, claps, hits, and textures'
                ]
            });
        }
    </script>
</body>
</html>
