<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>emono - ER-301 Hyperscale</title>
    <link rel="stylesheet" href="../../../styles.css">
    <link rel="stylesheet" href="../../../lib/effect-ui.css">
    <script src="../../../lib/pedalboard-effects.js"></script>
    <script src="../../../lib/effect-ui.js"></script>
    <script type="module" src="../../../lib/phonebook-features.js"></script>
    <script src="../lib/er301-info-panel.js"></script>
    <style>
        .section-label {
            font-size: 0.7em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5em;
            display: block;
        }
        .param-controls {
            border-bottom: 1px solid #222;
            padding-bottom: 1em;
            margin-bottom: 1em;
        }
        .param-row {
            display: flex;
            gap: 1em;
            flex-wrap: wrap;
        }
        .param-row .param-group {
            flex: 1;
            min-width: 80px;
        }
        .voice-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 1em;
        }
        .voice-card {
            background: #0a0a14;
            border-radius: 6px;
            padding: 12px;
            text-align: center;
        }
        .voice-card .label {
            font-size: 0.7em;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .euclid-display {
            display: flex;
            justify-content: center;
            gap: 3px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .euclid-step {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #1a1a2e;
            transition: all 0.1s;
        }
        .euclid-step.on {
            background: #444;
        }
        .euclid-step.active {
            background: #8b5cf6;
            box-shadow: 0 0 8px #8b5cf6;
        }
        .sample-visualizer {
            max-width: 800px;
            width: 100%;
            margin: 1rem auto;
        }
        .sample-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 0.75rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            max-height: 120px;
            overflow-y: auto;
        }
        .sample-slot {
            width: 28px;
            height: 28px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: var(--text-secondary);
            transition: all 0.15s;
        }
        .sample-slot.playing {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--glow);
            transform: scale(1.1);
        }
        .now-playing {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
        }
        .sample-import {
            margin-top: 1em;
            text-align: center;
        }
        .sample-import input {
            display: none;
        }
        .sample-import label {
            cursor: pointer;
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
        }
        .sample-import label:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .toggle-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75em;
        }
        .toggle-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="patch-page">
        <header class="patch-header">
            <a href="../../../index.html" class="back-link">&larr; Back</a>
            <div class="patch-info">
                <h1>emono</h1>
                <p>4-voice Euclidean sampler with Monolith 2 Kit and spread delay</p>
            </div>
        </header>

        <main class="patch-content">
            <canvas id="visualizer"></canvas>

            <div class="controls">
                <button class="play-btn" id="playBtn">&#9654;</button>
            </div>

            <!-- Euclidean Voice Display -->
            <div class="voice-grid" id="voiceGrid">
                <div class="voice-card">
                    <div class="label">Voice 1</div>
                    <div class="euclid-display" id="euclid1"></div>
                </div>
                <div class="voice-card">
                    <div class="label">Voice 2</div>
                    <div class="euclid-display" id="euclid2"></div>
                </div>
                <div class="voice-card">
                    <div class="label">Voice 3</div>
                    <div class="euclid-display" id="euclid3"></div>
                </div>
                <div class="voice-card">
                    <div class="label">Voice 4</div>
                    <div class="euclid-display" id="euclid4"></div>
                </div>
            </div>

            <!-- Clock Section -->
            <span class="section-label">Clock</span>
            <div class="param-controls">
                <div class="param-row">
                    <div class="param-group">
                        <label>Tempo BPM</label>
                        <input type="range" id="tempo" min="30" max="200" value="120" step="1">
                        <span class="param-value" id="tempoVal">120</span>
                    </div>
                    <div class="param-group">
                        <label>Clock Mult</label>
                        <input type="range" id="clkMult" min="1" max="8" value="2" step="1">
                        <span class="param-value" id="clkMultVal">2</span>
                    </div>
                    <div class="param-group">
                        <label>Clock Div</label>
                        <input type="range" id="clkDiv" min="1" max="8" value="1" step="1">
                        <span class="param-value" id="clkDivVal">1</span>
                    </div>
                    <div class="param-group">
                        <label>Clock Prob</label>
                        <input type="range" id="clkProb" min="0" max="1" value="0.85" step="0.01">
                        <span class="param-value" id="clkProbVal">0.85</span>
                    </div>
                    <div class="param-group">
                        <label>Random Clock</label>
                        <button class="toggle-btn active" id="rndClk">ON</button>
                    </div>
                </div>
            </div>

            <!-- Euclidean Sequencer Section -->
            <span class="section-label">Euclidean Sequencers</span>
            <div class="param-controls">
                <div class="param-row">
                    <div class="param-group">
                        <label>Beats 1</label>
                        <input type="range" id="beats1" min="1" max="16" value="5" step="1">
                        <span class="param-value" id="beats1Val">5</span>
                    </div>
                    <div class="param-group">
                        <label>Length 1</label>
                        <input type="range" id="length1" min="1" max="32" value="20" step="1">
                        <span class="param-value" id="length1Val">20</span>
                    </div>
                    <div class="param-group">
                        <label>Prob 1</label>
                        <input type="range" id="prob1" min="0" max="1" value="0.45" step="0.01">
                        <span class="param-value" id="prob1Val">0.45</span>
                    </div>
                    <div class="param-group">
                        <label>Rotate 1</label>
                        <button class="toggle-btn" id="rotate1">OFF</button>
                    </div>
                </div>
                <div class="param-row">
                    <div class="param-group">
                        <label>Beats 2</label>
                        <input type="range" id="beats2" min="1" max="16" value="3" step="1">
                        <span class="param-value" id="beats2Val">3</span>
                    </div>
                    <div class="param-group">
                        <label>Length 2</label>
                        <input type="range" id="length2" min="1" max="32" value="12" step="1">
                        <span class="param-value" id="length2Val">12</span>
                    </div>
                    <div class="param-group">
                        <label>Prob 2</label>
                        <input type="range" id="prob2" min="0" max="1" value="0.6" step="0.01">
                        <span class="param-value" id="prob2Val">0.60</span>
                    </div>
                    <div class="param-group">
                        <label>Rotate 2</label>
                        <button class="toggle-btn" id="rotate2">OFF</button>
                    </div>
                </div>
                <div class="param-row">
                    <div class="param-group">
                        <label>Beats 3</label>
                        <input type="range" id="beats3" min="1" max="16" value="4" step="1">
                        <span class="param-value" id="beats3Val">4</span>
                    </div>
                    <div class="param-group">
                        <label>Length 3</label>
                        <input type="range" id="length3" min="1" max="32" value="9" step="1">
                        <span class="param-value" id="length3Val">9</span>
                    </div>
                    <div class="param-group">
                        <label>Prob 3</label>
                        <input type="range" id="prob3" min="0" max="1" value="0.61" step="0.01">
                        <span class="param-value" id="prob3Val">0.61</span>
                    </div>
                    <div class="param-group">
                        <label>Rotate 3</label>
                        <button class="toggle-btn" id="rotate3">OFF</button>
                    </div>
                </div>
                <div class="param-row">
                    <div class="param-group">
                        <label>Beats 4</label>
                        <input type="range" id="beats4" min="1" max="16" value="2" step="1">
                        <span class="param-value" id="beats4Val">2</span>
                    </div>
                    <div class="param-group">
                        <label>Length 4</label>
                        <input type="range" id="length4" min="1" max="32" value="16" step="1">
                        <span class="param-value" id="length4Val">16</span>
                    </div>
                    <div class="param-group">
                        <label>Prob 4</label>
                        <input type="range" id="prob4" min="0" max="1" value="0.35" step="0.01">
                        <span class="param-value" id="prob4Val">0.35</span>
                    </div>
                    <div class="param-group">
                        <label>Rotate 4</label>
                        <button class="toggle-btn" id="rotate4">OFF</button>
                    </div>
                </div>
            </div>

            <!-- Pitch Section -->
            <span class="section-label">Pitch</span>
            <div class="param-controls">
                <div class="param-row">
                    <div class="param-group">
                        <label>Random Pitch</label>
                        <button class="toggle-btn active" id="rndPitch">ON</button>
                    </div>
                    <div class="param-group">
                        <label>Tune 1</label>
                        <input type="range" id="tune1" min="-12" max="12" value="0" step="1">
                        <span class="param-value" id="tune1Val">0</span>
                    </div>
                    <div class="param-group">
                        <label>Tune 2</label>
                        <input type="range" id="tune2" min="-12" max="12" value="0" step="1">
                        <span class="param-value" id="tune2Val">0</span>
                    </div>
                    <div class="param-group">
                        <label>Tune 3</label>
                        <input type="range" id="tune3" min="-12" max="12" value="0" step="1">
                        <span class="param-value" id="tune3Val">0</span>
                    </div>
                    <div class="param-group">
                        <label>Tune 4</label>
                        <input type="range" id="tune4" min="-12" max="12" value="0" step="1">
                        <span class="param-value" id="tune4Val">0</span>
                    </div>
                </div>
            </div>

            <!-- Delay Section -->
            <span class="section-label">Spread Delay</span>
            <div class="param-controls">
                <div class="param-row">
                    <div class="param-group">
                        <label>Random Delay</label>
                        <button class="toggle-btn active" id="rndDel">ON</button>
                    </div>
                    <div class="param-group">
                        <label>Delay Time</label>
                        <input type="range" id="delay" min="0.01" max="1" value="0.12" step="0.01">
                        <span class="param-value" id="delayVal">0.12</span>
                    </div>
                    <div class="param-group">
                        <label>Spread</label>
                        <input type="range" id="spread" min="-1" max="1" value="0.4" step="0.01">
                        <span class="param-value" id="spreadVal">0.40</span>
                    </div>
                    <div class="param-group">
                        <label>Feedback</label>
                        <input type="range" id="fdbk" min="0" max="0.95" value="0.35" step="0.01">
                        <span class="param-value" id="fdbkVal">0.35</span>
                    </div>
                    <div class="param-group">
                        <label>Wet/Dry</label>
                        <input type="range" id="wetdry" min="0" max="1" value="0.3" step="0.01">
                        <span class="param-value" id="wetdryVal">0.30</span>

            <!-- Output Section -->
            <span class="section-label">Output</span>
            <div class="param-controls">

            <!-- Sample Grid -->

            <div class="sample-import">
                <input type="file" id="sampleInput" multiple accept="audio/*">

            </div>

            <div id="pedalboard-container" class="pedalboard-container"></div>
        </main>

    <script>
        const processorCode = `
// emono - 4-voice Euclidean sample player with Monolith 2 Kit
class EmonoProcessor extends AudioWorkletProcessor {
    constructor() {
        super();
        this.sr = sampleRate;
        this.playing = false;
        this.samples = [];
        this.sampleNames = [];

        // Clock
        this.clockPhase = 0;
        this.lastClock = 0;
        this.rndClockPhase = 0;

        // 4 Euclidean sequencers
        this.euclideans = [
            { beats: 5, length: 20, step: 0, pattern: [], rotate: 0, rotateEnabled: false },
            { beats: 3, length: 12, step: 0, pattern: [], rotate: 0, rotateEnabled: false },
            { beats: 4, length: 9, step: 0, pattern: [], rotate: 0, rotateEnabled: false },
            { beats: 2, length: 16, step: 0, pattern: [], rotate: 0, rotateEnabled: false }
        ];

        // Generate initial patterns
        for (let i = 0; i < 4; i++) {
            this.generateEuclidean(i);
        }

        // 4 sample players with voice state
        this.voices = [
            { sampleIdx: 0, position: 0, speed: 1, active: false, pitch: 1, samplePool: [] },
            { sampleIdx: 0, position: 0, speed: 1, active: false, pitch: 1, samplePool: [] },
            { sampleIdx: 0, position: 0, speed: 1, active: false, pitch: 1, samplePool: [] },
            { sampleIdx: 0, position: 0, speed: 1, active: false, pitch: 1, samplePool: [] }
        ];

        // Random pitch values (pingable scaled random)
        this.randomPitch = [0, 0, 0, 0];
        this.targetPitch = [0, 0, 0, 0];

        // Random delay modulation
        this.delayMod = 0;
        this.targetDelayMod = 0;

        // Spread Delay
        const maxDelay = Math.ceil(this.sr * 1.5);
        this.delayLineL = new Float32Array(maxDelay);
        this.delayLineR = new Float32Array(maxDelay);
        this.delayWriteIdx = 0;

        // DC blockers
        this.dcL = { x1: 0, y1: 0 };
        this.dcR = { x1: 0, y1: 0 };

        // Parameters
        this.params = {
            tempo: 120,
            clkMult: 2,
            clkDiv: 1,
            clkProb: 0.85,
            rndClk: true,
            beats1: 5, length1: 20, prob1: 0.45, rotate1: false,
            beats2: 3, length2: 12, prob2: 0.60, rotate2: false,
            beats3: 4, length3: 9, prob3: 0.61, rotate3: false,
            beats4: 2, length4: 16, prob4: 0.35, rotate4: false,
            rndPitch: true,
            tune1: 0, tune2: 0, tune3: 0, tune4: 0,
            rndDel: true,
            delay: 0.12,
            spread: 0.4,
            fdbk: 0.35,
            wetdry: 0.3,
            vol: 0.7
        };

        this.port.onmessage = (e) => {
            if (e.data.type === 'start') this.playing = true;
            if (e.data.type === 'stop') this.playing = false;
            if (e.data.type === 'loadSamples') {
                this.samples = e.data.samples;
                this.sampleNames = e.data.names || [];
                // Assign samples to voice pools (divide evenly)
                const perVoice = Math.ceil(this.samples.length / 4);
                for (let v = 0; v < 4; v++) {
                    this.voices[v].samplePool = [];
                    for (let i = v * perVoice; i < Math.min((v + 1) * perVoice, this.samples.length); i++) {
                        this.voices[v].samplePool.push(i);
                    }
                    if (this.voices[v].samplePool.length === 0 && this.samples.length > 0) {
                        this.voices[v].samplePool.push(0);
                    }
                }
            }
            if (e.data.type === 'param') {
                this.params[e.data.name] = e.data.value;
                // Regenerate patterns if beats/length changed
                if (e.data.name.startsWith('beats') || e.data.name.startsWith('length')) {
                    const idx = parseInt(e.data.name.slice(-1)) - 1;
                    this.euclideans[idx].beats = this.params['beats' + (idx + 1)];
                    this.euclideans[idx].length = this.params['length' + (idx + 1)];
                    this.generateEuclidean(idx);
                }
                // Update rotate enable
                if (e.data.name.startsWith('rotate')) {
                    const idx = parseInt(e.data.name.slice(-1)) - 1;
                    this.euclideans[idx].rotateEnabled = e.data.value;
                }
            }
        };
    }

    generateEuclidean(idx) {
        const euc = this.euclideans[idx];
        const beats = Math.min(euc.beats, euc.length);
        const length = euc.length;

        // Bjorklund algorithm
        let pattern = [];
        if (beats === 0) {
            pattern = new Array(length).fill(0);
        } else if (beats >= length) {
            pattern = new Array(length).fill(1);
        } else {
            let groups = [];
            for (let i = 0; i < length; i++) {
                groups.push([i < beats ? 1 : 0]);
            }

            while (true) {
                const ones = groups.filter(g => g[0] === 1).length;
                const zeros = groups.filter(g => g[0] === 0).length;

                if (ones === 0 || zeros === 0 || zeros === 1) break;

                const minCount = Math.min(ones, zeros);
                const newGroups = [];

                for (let i = 0; i < minCount; i++) {
                    const oneGroup = groups.find(g => g[0] === 1);
                    const zeroGroup = groups.find(g => g[0] === 0);
                    groups = groups.filter(g => g !== oneGroup && g !== zeroGroup);
                    newGroups.push([...oneGroup, ...zeroGroup]);
                }

                groups = [...newGroups, ...groups];
            }

            pattern = groups.flat();
        }

        euc.pattern = pattern;
    }

    dcBlock(sample, state) {
        const R = 0.995;
        const y = sample - state.x1 + R * state.y1;
        state.x1 = sample;
        state.y1 = y;
        return y;
    }

    process(inputs, outputs, parameters) {
        const output = outputs[0];
        const outL = output[0];
        const outR = output[1];

        if (!this.playing || this.samples.length === 0) {
            outL.fill(0);
            outR.fill(0);
            return true;
        }

        const clockInc = (this.params.tempo / 60) * (this.params.clkMult / this.params.clkDiv) / this.sr;

        for (let i = 0; i < outL.length; i++) {
            // Clock with probability
            this.clockPhase += clockInc;
            let clockEdge = false;
            if (this.clockPhase >= 1) {
                this.clockPhase -= 1;
                // Random clock varies timing slightly
                if (this.params.rndClk) {
                    if (Math.random() < this.params.clkProb) {
                        clockEdge = true;
                    }
                } else {
                    clockEdge = true;
                }
            }

            // Random delay modulation
            if (this.params.rndDel && clockEdge) {
                this.targetDelayMod = (Math.random() - 0.5) * 0.1; // +/- 10% delay variation
            }
            this.delayMod += (this.targetDelayMod - this.delayMod) * 0.001;

            // Process each Euclidean voice
            let mixL = 0, mixR = 0;

            for (let v = 0; v < 4; v++) {
                const euc = this.euclideans[v];
                const voice = this.voices[v];
                const prob = this.params['prob' + (v + 1)];
                const tune = this.params['tune' + (v + 1)];

                // Advance step on clock edge
                if (clockEdge && euc.pattern.length > 0) {
                    euc.step = (euc.step + 1) % euc.pattern.length;

                    // Rotate pattern if enabled
                    if (euc.rotateEnabled && euc.step === 0) {
                        euc.rotate = (euc.rotate + 1) % euc.pattern.length;
                    }

                    // Check if current step is a beat
                    const stepIdx = (euc.step + euc.rotate) % euc.pattern.length;
                    if (euc.pattern[stepIdx] === 1) {
                        // Chance gate
                        if (Math.random() < prob) {
                            // Trigger sample
                            if (voice.samplePool.length > 0) {
                                voice.sampleIdx = voice.samplePool[Math.floor(Math.random() * voice.samplePool.length)];
                                voice.position = 0;
                                voice.active = true;

                                // Random pitch if enabled
                                if (this.params.rndPitch) {
                                    this.targetPitch[v] = (Math.random() - 0.5) * 0.5; // +/- ~6 semitones
                                }

                                // Report trigger
                                this.port.postMessage({
                                    type: 'trigger',
                                    voice: v,
                                    sampleIdx: voice.sampleIdx,
                                    step: euc.step
                                });
                            }
                        }
                    }
                }

                // Slew pitch
                this.randomPitch[v] += (this.targetPitch[v] - this.randomPitch[v]) * 0.001;

                // Calculate playback speed
                const pitchOffset = tune / 12 + (this.params.rndPitch ? this.randomPitch[v] : 0);
                voice.speed = Math.pow(2, pitchOffset);

                // Play sample
                if (voice.active && this.samples[voice.sampleIdx]) {
                    const sample = this.samples[voice.sampleIdx];
                    const idx = Math.floor(voice.position);
                    const frac = voice.position - idx;

                    if (idx < sample.length - 1) {
                        // Linear interpolation
                        const s0 = sample[idx];
                        const s1 = sample[idx + 1];
                        const sampleOut = s0 + frac * (s1 - s0);

                        // Stereo spread based on voice
                        const pan = (v - 1.5) / 1.5 * 0.5; // -0.5 to 0.5
                        mixL += sampleOut * (0.5 - pan * 0.5);
                        mixR += sampleOut * (0.5 + pan * 0.5);

                        voice.position += voice.speed;
                    } else {
                        voice.active = false;
                    }
                }
            }

            // Spread Delay with optional modulation
            const delayBase = this.params.delay * (1 + this.delayMod);
            const delaySamplesBase = delayBase * this.sr;
            const spreadOffset = Math.abs(this.params.spread) * delaySamplesBase * 0.5;
            const spreadSign = this.params.spread >= 0 ? 1 : -1;
            const delaySamplesL = Math.max(1, Math.floor(delaySamplesBase - spreadOffset * spreadSign));
            const delaySamplesR = Math.max(1, Math.floor(delaySamplesBase + spreadOffset * spreadSign));

            const delayReadL = (this.delayWriteIdx - delaySamplesL + this.delayLineL.length) % this.delayLineL.length;
            const delayReadR = (this.delayWriteIdx - delaySamplesR + this.delayLineR.length) % this.delayLineR.length;

            const delayOutL = this.delayLineL[delayReadL];
            const delayOutR = this.delayLineR[delayReadR];

            this.delayLineL[this.delayWriteIdx] = mixL + delayOutR * this.params.fdbk; // Cross feedback
            this.delayLineR[this.delayWriteIdx] = mixR + delayOutL * this.params.fdbk;
            this.delayWriteIdx = (this.delayWriteIdx + 1) % this.delayLineL.length;

            // Mix wet/dry
            mixL = mixL * (1 - this.params.wetdry) + delayOutL * this.params.wetdry;
            mixR = mixR * (1 - this.params.wetdry) + delayOutR * this.params.wetdry;

            // DC block
            mixL = this.dcBlock(mixL, this.dcL);
            mixR = this.dcBlock(mixR, this.dcR);

            // Output with volume
            outL[i] = Math.tanh(mixL * this.params.vol * 2);
            outR[i] = Math.tanh(mixR * this.params.vol * 2);
        }

        return true;
    }
}

registerProcessor('emono-processor', EmonoProcessor);

        let audioContext, workletNode, pedalboard;
        let isPlaying = false;
        let sampleNames = [];

        let stickyHeader = null;
        let modMatrixUI = null;
        let midiLearn = null;
        let modMatrix = null;
        const playBtn = document.getElementById('playBtn');
        const sampleGrid = document.getElementById('sampleGrid');
        const nowPlaying = document.getElementById('nowPlaying');

        // Initialize Euclidean displays
        function initEuclidDisplays() {
            for (let v = 1; v <= 4; v++) {
                const container = document.getElementById('euclid' + v);
                const length = parseInt(document.getElementById('length' + v).value);
                container.innerHTML = '';
                for (let i = 0; i < length; i++) {
                    const step = document.createElement('div');
                    step.className = 'euclid-step';
                    container.appendChild(step);
                }
            }
        }

        function updateEuclidDisplay(voice, step, pattern) {
            const container = document.getElementById('euclid' + (voice + 1));
            const steps = container.querySelectorAll('.euclid-step');
            steps.forEach((el, i) => {
                el.classList.remove('active');
                el.classList.toggle('on', pattern[i] === 1);
                if (i === step) el.classList.add('active');
            });
        }

        function buildSampleGrid(names) {
            sampleGrid.innerHTML = names.map((name, i) =>
                `<div class="sample-slot" data-index="${i}" title="${name}">${i + 1}</div>`
            ).join('');
        }

        function updatePlayingSample(index, name) {
            document.querySelectorAll('.sample-slot').forEach((slot, i) => {
                slot.classList.toggle('playing', i === index);
            });
            nowPlaying.textContent = `Voice triggered: ${name}`;
            nowPlaying.style.color = 'var(--accent)';
        }

        async function loadDefaultSamples() {
            const basePath = '../samples/hyperscale/emono/';

            // Monolith 2 Kit sample names
            const defaultSamples = [
                'monobd-04.wav', 'monobd02.wav', 'monobeam01.wav', 'monobeam02.wav', 'monobeam03.wav',
                'monoclap01.wav', 'monoclap02.wav', 'monocrash.wav', 'monogiant01.wav', 'monogiant02.wav',
                'monogiant03.wav', 'monogiant04.wav', 'monogiant05.wav', 'monohihat01.wav', 'monohihat02.wav',
                'monohihat03.wav', 'monohihat04.wav', 'monohihat05.wav', 'monohihat06.wav', 'monoperc01.wav',
                'monoperc02.wav', 'monoperc03.wav', 'monoperc04.wav', 'monorim01.wav', 'monorim02.wav',
                'monosn-01.wav', 'monosn03.wav', 'monotom01.wav', 'monotom02.wav', 'monotom03.wav',
                'monotomhar01.wav', 'monotomhar02.wav', 'monotomhar03.wav', 'monotrim.wav',
                'ra-bdunder1.wav', 'ra-bdunder2.wav', 'ra-bdunder3.wav'
            ];

            const loadedSamples = [];
            const loadedNames = [];

            for (const name of defaultSamples) {
                try {
                    const resp = await fetch(basePath + name);
                    if (resp.ok) {
                        const buffer = await resp.arrayBuffer();
                        const audioBuffer = await audioContext.decodeAudioData(buffer);
                        loadedSamples.push(audioBuffer.getChannelData(0));
                        loadedNames.push(name);
                    }
                } catch (e) {
                    console.log('Could not load:', name);
                }
            }

            if (loadedSamples.length > 0) {
                sampleNames = loadedNames;
                workletNode.port.postMessage({
                    type: 'loadSamples',
                    samples: loadedSamples,
                    names: loadedNames
                });
                buildSampleGrid(loadedNames);
                nowPlaying.textContent = `Loaded ${loadedSamples.length} Monolith 2 Kit samples`;
            }
        }

        
        // Wait for phonebook features to load (or timeout after 2 seconds)
        const featuresLoaded = new Promise(resolve => {
            if (typeof StickyHeader !== 'undefined') {
                resolve(true);
            } else {
                window.addEventListener('phonebook-features-loaded', () => resolve(true), { once: true });
                setTimeout(() => resolve(false), 2000);
            }
        });

        async function initAudio() {
            // Wait for features to load first
            await featuresLoaded;

            audioContext = new AudioContext({ sampleRate: 48000 });
            const blob = new Blob([processorCode], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            await audioContext.audioWorklet.addModule(url);
            workletNode = new AudioWorkletNode(audioContext, 'emono-processor', {
                numberOfInputs: 0,
                numberOfOutputs: 1,
                outputChannelCount: [2]
            });
            // Setup pedalboard
            const container = document.getElementById('pedalboard-container');
            pedalboard = new PedalboardUI(container, audioContext);
            const fxNode = await pedalboard.init();
            pedalboard.connect(workletNode);
            fxNode.connect(audioContext.destination);

            // Initialize features if phonebook-features.js is loaded
            if (typeof StickyHeader !== 'undefined') {
                stickyHeader = new StickyHeader({
                    patchName: 'emono-er-301-hyperscale',
                    patchId: 'er-301-patches-hyperscale-emono'
                });
                await stickyHeader.init();
                await stickyHeader.initRecorder(audioContext, fxNode || workletNode, audioContext.destination);
            }

            if (typeof getMidiLearn !== 'undefined') {
                midiLearn = await getMidiLearn('er-301-patches-hyperscale-emono');
            }

            if (typeof getModulationMatrix !== 'undefined') {
                modMatrix = getModulationMatrix();
                modMatrixUI = new ModMatrixUI(
                    document.querySelector('.patch-content'),
                    { modMatrix: modMatrix }
                );
                modMatrixUI.init();
            }

            // Auto-register all sliders for MIDI Learn and Mod Matrix
            if (typeof autoRegisterControls !== 'undefined') {
                await autoRegisterControls({
                    patchId: 'er-301-patches-hyperscale-emono',
                    prefix: 'emono',
                    modMatrixUI: modMatrixUI
                });
            }

            // Handle messages from processor
            workletNode.port.onmessage = (e) => {
                if (e.data.type === 'trigger') {
                    updatePlayingSample(e.data.sampleIdx, sampleNames[e.data.sampleIdx] || 'Sample');
                }
            };

            // Try to load default samples
            loadDefaultSamples();

            // Visualizer
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;
            fxNode.connect(analyser);
            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteTimeDomainData(dataArray);
                ctx.fillStyle = '#0a0a14';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#8b5cf6';
                ctx.beginPath();
                const sliceWidth = canvas.width / dataArray.length;
                let x = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    const v = dataArray[i] / 128.0;
                    const y = v * canvas.height / 2;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                    x += sliceWidth;
                }
                ctx.stroke();
            }
            draw();
        }

        playBtn.onclick = async () => {
            if (!audioContext) await initAudio();
            if (audioContext.state === 'suspended') await audioContext.resume();

            isPlaying = !isPlaying;
            playBtn.textContent = isPlaying ? '⏹' : '▶';
            workletNode.port.postMessage({ type: isPlaying ? 'start' : 'stop' });
        };

        // Sample import
        document.getElementById('sampleInput').onchange = async (e) => {
            if (!audioContext) await initAudio();
            const files = Array.from(e.target.files);
            const loadedSamples = [];
            const loadedNames = [];

            for (const file of files) {
                const buffer = await file.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(buffer);
                loadedSamples.push(audioBuffer.getChannelData(0));
                loadedNames.push(file.name);
            }

            sampleNames = loadedNames;
            workletNode.port.postMessage({
                type: 'loadSamples',
                samples: loadedSamples,
                names: loadedNames
            });
            buildSampleGrid(loadedNames);
            nowPlaying.textContent = `Loaded ${loadedSamples.length} samples`;
        };

        // Clear samples
        document.getElementById('clearSamples').onclick = () => {
            sampleNames = [];
            if (workletNode) {
                workletNode.port.postMessage({
                    type: 'loadSamples',
                    samples: [],
                    names: []
                });
            }
            sampleGrid.innerHTML = '';
            nowPlaying.textContent = 'Samples cleared - Import new samples';
            nowPlaying.style.color = 'var(--text-secondary)';
        };

        // Parameter controls
        const params = [
            'tempo', 'clkMult', 'clkDiv', 'clkProb',
            'beats1', 'length1', 'prob1',
            'beats2', 'length2', 'prob2',
            'beats3', 'length3', 'prob3',
            'beats4', 'length4', 'prob4',
            'tune1', 'tune2', 'tune3', 'tune4',
            'delay', 'spread', 'fdbk', 'wetdry', 'vol'
        ];

        params.forEach(name => {
            const input = document.getElementById(name);
            const display = document.getElementById(name + 'Val');
            if (input && display) {
                input.oninput = () => {
                    const val = parseFloat(input.value);
                    display.textContent = Number.isInteger(val) ? val : val.toFixed(2);
                    if (workletNode) {
                        workletNode.port.postMessage({ type: 'param', name, value: val });
                    }
                    // Update euclid displays when length changes
                    if (name.startsWith('length')) {
                        initEuclidDisplays();
                    }
                };
            }
        });

        // Toggle buttons
        const toggles = ['rndClk', 'rndPitch', 'rndDel', 'rotate1', 'rotate2', 'rotate3', 'rotate4'];
        toggles.forEach(name => {
            const btn = document.getElementById(name);
            if (btn) {
                btn.onclick = () => {
                    const isActive = btn.classList.toggle('active');
                    btn.textContent = isActive ? 'ON' : 'OFF';
                    if (workletNode) {
                        workletNode.port.postMessage({ type: 'param', name, value: isActive });
                    }
                };
            }
        });

        // Initialize euclid displays
        initEuclidDisplays();

        // Info panel
        if (typeof ER301InfoPanel !== 'undefined') {
            new ER301InfoPanel(document.body, {
                title: 'emono',
                author: 'mudlogger',
                origin: 'ER-301 Hyperscale Units',
                description: '4-voice Euclidean sample player using Monolith 2 Kit. Features random clock probability, pattern rotation, random pitch and delay modulation.',
                controls: [
                    { name: 'Beats 1-4', range: '1-16', description: 'Number of hits in Euclidean pattern' },
                    { name: 'Length 1-4', range: '1-32', description: 'Total steps in pattern' },
                    { name: 'Prob 1-4', range: '0-1', description: 'Probability of triggering on beat' },
                    { name: 'Rotate 1-4', range: 'on/off', description: 'Auto-rotate pattern each cycle' },
                    { name: 'Tune 1-4', range: '-12 to +12', description: 'Semitone offset per voice' },
                    { name: 'Random Pitch', range: 'on/off', description: 'Enable random pitch variation' },
                    { name: 'Random Delay', range: 'on/off', description: 'Enable delay time modulation' },
                    { name: 'Spread', range: '-1 to 1', description: 'Stereo delay spread (negative inverts)' },
                    { name: 'Feedback', range: '0-0.95', description: 'Cross-feedback between L/R delays' }
                ],
                tips: [
                    'Rotate adds evolving variation to patterns over time',
                    'Random delay creates tape-like pitch wobble on delays',
                    'Negative spread inverts the stereo image',
                    'The Monolith 2 Kit has 37 diverse drum samples'
                ]
            });
        }
