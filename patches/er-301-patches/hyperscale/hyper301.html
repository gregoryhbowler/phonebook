    <style>
        .section-label {
            font-size: 0.7em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5em;
            display: block;
        }
        .param-controls {
            border-bottom: 1px solid #222;
            padding-bottom: 1em;
            margin-bottom: 1em;
        }
        .param-row {
            display: flex;
            gap: 1em;
            flex-wrap: wrap;
        }
        .param-row .param-group {
            flex: 1;
            min-width: 70px;
        }
        .sample-visualizer {
            max-width: 800px;
            width: 100%;
            margin: 1rem auto;
        }
        .sample-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 0.75rem;

            border: 1px solid var(--border, #333);

            background: var(--bg-card, #1a1a1a);

            justify-content: center;

            color: #ccc;
            border-radius: 4px;

            font-size: 0.8em;

            <!-- Sample Import -->
            <div class="sample-actions">

            <div id="pedalboard-container" class="pedalboard-container"></div>

    <script>
        const processorCode = `
// ============================================================================
// SLEW LIMITER
// ============================================================================
class SlewLimiter {
    constructor(time, sr) {
        this.sr = sr;
        this.setTime(time);
        this.value = 1;
    }

    setTime(time) {
        this.rate = 1 / (time * this.sr + 1);
    }

    process(target) {
        const diff = target - this.value;
        this.value += diff * this.rate;
        return this.value;
    }
}

// ============================================================================
// PINGABLE SCALED RANDOM
// ============================================================================
class PingableScaledRandom {
    constructor() {
        this.value = 0.5;
        this.target = 0.5;
        this.min = 0;
        this.max = 1;
    }

    ping() {
        this.target = this.min + Math.random() * (this.max - this.min);
    }

    setRange(min, max) {
        this.min = min;
        this.max = max;
    }

    process(slew) {
        this.value += (this.target - this.value) * slew;
        return this.value;
    }
}

// ============================================================================
// CLOCKED RANDOM GATE
// ============================================================================
class ClockedRandomGate {
    constructor(sr) {
        this.sr = sr;
        this.phase = 0;
        this.rate = 4;
        this.mul = 1;
        this.div = 1;
        this.prob = 0.5;
        this.gateOpen = false;
    }

    setRate(r) { this.rate = Math.max(0.1, r); }
    setMul(m) { this.mul = Math.max(1, m); }
    setDiv(d) { this.div = Math.max(1, d); }
    setProb(p) { this.prob = p; }

    process() {
        const effectiveRate = (this.rate * this.mul) / this.div;
        this.phase += effectiveRate / this.sr;

        let triggered = false;
        if (this.phase >= 1) {
            this.phase -= 1;
            if (Math.random() < this.prob) {
                triggered = true;
                this.gateOpen = true;
            }
        }

        if (this.phase > 0.5) {
            this.gateOpen = false;
        }

        return triggered;
    }
}

// ============================================================================
// VELVET NOISE
// ============================================================================
class VelvetNoise {
    constructor(sr) {
        this.sr = sr;
        this.density = 2000; // impulses per second
        this.counter = 0;
        this.nextImpulse = 0;
        this.scheduleNext();
    }

    setDensity(d) {
        this.density = Math.max(10, d);
    }

    scheduleNext() {
        // Random interval for next impulse
        const avgInterval = this.sr / this.density;
        this.nextImpulse = this.counter + Math.floor(avgInterval * (0.5 + Math.random()));
    }

    process() {
        this.counter++;
        if (this.counter >= this.nextImpulse) {
            this.scheduleNext();
            // Random polarity impulse
            return Math.random() > 0.5 ? 1 : -1;
        }
        return 0;
    }
}

// ============================================================================
// HYPER301 PROCESSOR
// ============================================================================
class Hyper301Processor extends AudioWorkletProcessor {
    constructor() {
        super();
        this.sr = sampleRate;
        this.playing = false;
        this.samples = [];
        this.sampleNames = [];

        // Current sample playback
        this.currentSample = null;
        this.samplePosition = 0;
        this.sampleSpeed = 1;
        this.currentSampleIndex = -1;

        // Two clocked random gates
        this.gate1 = new ClockedRandomGate(this.sr);
        this.gate2 = new ClockedRandomGate(this.sr);

        // Pingable scaled random for pitch
        this.pitchRandom = new PingableScaledRandom();
        this.pitchSlew = new SlewLimiter(0.024, this.sr);

        // Velvet noise
        this.velvetL = new VelvetNoise(this.sr);
        this.velvetR = new VelvetNoise(this.sr);

        // Envelope
        this.env = 1;

        // Parameters
        this.params = {
            trigRate: 4,
            prob: 0.7,
            mul: 1,
            div: 1,
            rprob: 0.5,
            rmul: 2,
            rdiv: 1,
            divProb: 0.3,
            hypersc: 1,
            sp: 1,
            pitchRand: 0.2,
            slew: 0.024,
            velvetDensity: 2000,
            velvetLevel: 0.15,
            vol: 0.7
        };

        this.port.onmessage = (e) => {
            if (e.data.type === 'start') this.playing = true;
            if (e.data.type === 'stop') this.playing = false;
            if (e.data.type === 'param') {
                this.params[e.data.name] = e.data.value;
            }
            if (e.data.type === 'loadSamples') {
                this.samples = e.data.samples;
                this.sampleNames = e.data.names || [];
            }
            if (e.data.type === 'clearSamples') {
                this.samples = [];
                this.sampleNames = [];
                this.currentSample = null;
            }
        };
    }

    triggerSample() {
        if (this.samples.length === 0) return;

        const idx = Math.floor(Math.random() * this.samples.length);
        this.currentSample = this.samples[idx];
        this.currentSampleIndex = idx;
        this.samplePosition = 0;
        this.env = 1;

        this.pitchRandom.ping();

        this.port.postMessage({
            type: 'sampleTriggered',
            index: idx
        });
    }

    process(inputs, outputs, parameters) {
        const output = outputs[0];
        const outL = output[0];
        const outR = output[1];

        if (!this.playing) {
            outL.fill(0);
            outR.fill(0);
            return true;
        }

        // Update gate parameters
        this.gate1.setRate(this.params.trigRate);
        this.gate1.setProb(this.params.prob);
        this.gate1.setMul(this.params.mul);
        this.gate1.setDiv(this.params.div);

        this.gate2.setRate(this.params.trigRate * this.params.rmul / this.params.rdiv);
        this.gate2.setProb(this.params.rprob);
        this.gate2.setMul(this.params.rmul);
        this.gate2.setDiv(this.params.rdiv);

        // Pitch random range
        const pitchRange = this.params.pitchRand * this.params.hypersc;
        this.pitchRandom.setRange(1 - pitchRange, 1 + pitchRange);
        this.pitchSlew.setTime(this.params.slew);

        // Velvet noise density
        this.velvetL.setDensity(this.params.velvetDensity);
        this.velvetR.setDensity(this.params.velvetDensity);

        let gate1State = false;
        let gate2State = false;

        for (let i = 0; i < outL.length; i++) {
            // Process gates
            const trig1 = this.gate1.process();
            const trig2 = this.gate2.process();

            gate1State = this.gate1.gateOpen;
            gate2State = this.gate2.gateOpen;

            // Division probability
            let triggered = false;
            if (trig1 && Math.random() > this.params.divProb) {
                triggered = true;
            }
            if (trig2 && Math.random() < this.params.divProb) {
                triggered = true;
            }

            if (triggered) {
                this.triggerSample();
            }

            // Smoothed pitch
            const pitchMod = this.pitchSlew.process(this.pitchRandom.value);
            this.sampleSpeed = this.params.sp * this.params.hypersc * pitchMod;

            // Sample playback
            let sampleOut = 0;
            if (this.currentSample) {
                const idx = Math.floor(this.samplePosition);
                if (idx >= 0 && idx < this.currentSample.length - 1) {
                    const frac = this.samplePosition - idx;
                    const s0 = this.currentSample[idx];
                    const s1 = this.currentSample[idx + 1];
                    sampleOut = s0 + frac * (s1 - s0);
                    this.samplePosition += this.sampleSpeed;
                } else {
                    this.env *= 0.999;
                }
            }

            sampleOut *= this.env;

            // Velvet noise
            const velvetL = this.velvetL.process() * this.params.velvetLevel;
            const velvetR = this.velvetR.process() * this.params.velvetLevel;

            // Stereo output
            let sigL = sampleOut + velvetL;
            let sigR = sampleOut + velvetR;

            // Volume
            sigL *= this.params.vol;
            sigR *= this.params.vol;

            outL[i] = Math.tanh(sigL);
            outR[i] = Math.tanh(sigR);
        }

        // Send state
        this.port.postMessage({
            type: 'state',
            sampleCount: this.samples.length,
            playingIndex: this.currentSampleIndex,
            pitchMod: this.pitchSlew.value,
            gate1: gate1State,
            gate2: gate2State
        });

        return true;
    }
}

registerProcessor('hyper301-processor', Hyper301Processor);
`;

        let audioContext, workletNode, pedalboard;
        let isPlaying = false;
        let sampleNames = [];

        let stickyHeader = null;
        let modMatrixUI = null;
        let midiLearn = null;
        let modMatrix = null;
        const playBtn = document.getElementById('playBtn');

        // Default sample paths (Drills Kit2 - 54 samples)
        const defaultSamplePaths = [
            'DrillBlips1.wav', 'DrillDelay1.wav', 'DrillDelay2.wav', 'DrillDelay3.wav', 'DrillDelay4.wav',
            'DrillDelay5.wav', 'DrillGlass1.wav', 'DrillGlass2.wav', 'DrillGlass3.wav', 'DrillHat1.wav',
            'DrillHit1.wav', 'DrillHit2.wav', 'DrillHit3.wav', 'DrillHit4.wav', 'DrillHit5.wav',
            'DrillHit6.wav', 'DrillHit67.wav', 'DrillKicks1.wav', 'DrillKicks2.wav', 'DrillKicks3.wav',
            'DrillKicks4.wav', 'DrillKicks5.wav', 'DrillLowBit.wav', 'DrillLowBit2.wav', 'DrillSnare1.wav',
            'DrillSnare2.wav', 'DrillSpeed1.wav', 'DrillSpeed10.wav', 'DrillSpeed11.wav', 'DrillSpeed12.wav',
            'DrillSpeed13.wav', 'DrillSpeed14.wav', 'DrillSpeed15.wav', 'DrillSpeed16.wav', 'DrillSpeed17.wav',
            'DrillSpeed18.wav', 'DrillSpeed19.wav', 'DrillSpeed2.wav', 'DrillSpeed3.wav', 'DrillSpeed4.wav',
            'DrillSpeed5.wav', 'DrillSpeed6.wav', 'DrillSpeed7.wav', 'DrillSpeed8.wav', 'DrillSpeed9.wav',
            'DrillStereo1.wav', 'DrillStereo2.wav', 'Drilldistort.wav', 'Drillsweep.wav', 'Drillsweep2.wav',
            'Drillsweep3.wav', 'DrillsweepLow.wav', 'DrillsweepLow2.wav', 'DrillsweepLow3.wav'
        ];

        function buildSampleGrid(names) {
            const grid = document.getElementById('sampleGrid');
            grid.innerHTML = names.map((name, i) =>
                `<div class="sample-slot" data-index="${i}" title="${name}">${i + 1}</div>`
            ).join('');
            document.getElementById('sampleCount').textContent = names.length;
        }

        function updatePlayingSample(index) {
            document.querySelectorAll('.sample-slot').forEach((slot, i) => {
                slot.classList.toggle('playing', i === index);
            });
            const nowPlaying = document.getElementById('nowPlaying');
            if (index >= 0 && sampleNames[index]) {
                nowPlaying.textContent = `▶ ${sampleNames[index]}`;
                nowPlaying.style.color = '#f39c12';
            }
            document.getElementById('playingIndex').textContent = index >= 0 ? index + 1 : '--';
        }

        async function loadDefaultSamples() {
            const samples = [];
            const names = [];
            const basePath = '../samples/hyperscale/hyper301/';

            for (const file of defaultSamplePaths) {
                try {
                    const response = await fetch(basePath + file);
                    if (response.ok) {
                        const buffer = await response.arrayBuffer();
                        const audioBuffer = await audioContext.decodeAudioData(buffer);
                        samples.push(audioBuffer.getChannelData(0));
                        names.push(file.replace('.wav', ''));
                    }
                } catch (err) {
                    console.log('Could not load:', file);
                }
            }

            if (samples.length > 0) {
                sampleNames = names;
                workletNode.port.postMessage({
                    type: 'loadSamples',
                    samples: samples,
                    names: names
                });
                buildSampleGrid(names);
                document.getElementById('nowPlaying').textContent = `Loaded ${samples.length} samples`;
            }
        }

        
        // Wait for phonebook features to load (or timeout after 2 seconds)
        const featuresLoaded = new Promise(resolve => {
            if (typeof StickyHeader !== 'undefined') {
                resolve(true);
            } else {
                window.addEventListener('phonebook-features-loaded', () => resolve(true), { once: true });
                setTimeout(() => resolve(false), 2000);
            }
        });

        async function initAudio() {
            // Wait for features to load first
            await featuresLoaded;

            audioContext = new AudioContext({ sampleRate: 48000 });
            const blob = new Blob([processorCode], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            await audioContext.audioWorklet.addModule(url);
            workletNode = new AudioWorkletNode(audioContext, 'hyper301-processor', {
                numberOfInputs: 0,
                numberOfOutputs: 1,
                outputChannelCount: [2]
            });

            // Setup pedalboard
            const container = document.getElementById('pedalboard-container');
            pedalboard = new PedalboardUI(container, audioContext);
            const fxNode = await pedalboard.init();
            pedalboard.connect(workletNode);
            fxNode.connect(audioContext.destination);

            // Initialize features if phonebook-features.js is loaded
            if (typeof StickyHeader !== 'undefined') {
                stickyHeader = new StickyHeader({
                    patchName: 'hyper301-er-301-hyperscale',
                    patchId: 'er-301-patches-hyperscale-hyper301'
                });
                await stickyHeader.init();
                await stickyHeader.initRecorder(audioContext, fxNode || workletNode, audioContext.destination);
            }

            if (typeof getMidiLearn !== 'undefined') {
                midiLearn = await getMidiLearn('er-301-patches-hyperscale-hyper301');
            }

            if (typeof getModulationMatrix !== 'undefined') {
                modMatrix = getModulationMatrix();
                modMatrixUI = new ModMatrixUI(
                    document.querySelector('.patch-content'),
                    { modMatrix: modMatrix }
                );
                modMatrixUI.init();
            }

            // Auto-register all sliders for MIDI Learn and Mod Matrix
            if (typeof autoRegisterControls !== 'undefined') {
                await autoRegisterControls({
                    patchId: 'er-301-patches-hyperscale-hyper301',
                    prefix: 'hyper301',
                    modMatrixUI: modMatrixUI
                });
            }

            // Handle messages
            workletNode.port.onmessage = (e) => {
                if (e.data.type === 'sampleTriggered') {
                    updatePlayingSample(e.data.index);
                }
                if (e.data.type === 'state') {
                    document.getElementById('pitchDisplay').textContent = e.data.pitchMod.toFixed(2);
                    document.getElementById('gate1').classList.toggle('active', e.data.gate1);
                    document.getElementById('gate2').classList.toggle('active', e.data.gate2);
                }
            };

            // Visualizer
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;
            fxNode.connect(analyser);
            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteTimeDomainData(dataArray);
                ctx.fillStyle = '#0a0a14';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#f39c12';
                ctx.beginPath();
                const sliceWidth = canvas.width / dataArray.length;
                let x = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    const v = dataArray[i] / 128.0;
                    const y = v * canvas.height / 2;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                    x += sliceWidth;
                }
                ctx.stroke();
            }
            draw();

            // Load default samples
            await loadDefaultSamples();
        }

        playBtn.onclick = async () => {
            if (!audioContext) await initAudio();
            if (audioContext.state === 'suspended') await audioContext.resume();

            isPlaying = !isPlaying;
            playBtn.textContent = isPlaying ? '\u23F9' : '\u25B6';
            workletNode.port.postMessage({ type: isPlaying ? 'start' : 'stop' });
        };

        // Import samples
        document.getElementById('importBtn').onclick = () => {
            document.getElementById('sampleInput').click();
        };

        document.getElementById('sampleInput').onchange = async (e) => {
            if (!audioContext) await initAudio();
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            const samples = [];
            const names = [];

            for (const file of files) {
                try {
                    const buffer = await file.arrayBuffer();
                    const audioBuffer = await audioContext.decodeAudioData(buffer);
                    samples.push(audioBuffer.getChannelData(0));
                    names.push(file.name.replace(/\.[^/.]+$/, ''));
                } catch (err) {
                    console.error('Error loading:', file.name);
                }
            }

            if (samples.length > 0) {
                sampleNames = names;
                workletNode.port.postMessage({
                    type: 'loadSamples',
                    samples: samples,
                    names: names
                });
                buildSampleGrid(names);
                document.getElementById('nowPlaying').textContent = `Loaded ${samples.length} custom samples`;
            }
        };

        // Clear samples
        document.getElementById('clearBtn').onclick = () => {
            if (workletNode) {
                workletNode.port.postMessage({ type: 'clearSamples' });
                sampleNames = [];
                document.getElementById('sampleGrid').innerHTML = '';
                document.getElementById('sampleCount').textContent = '0';
                document.getElementById('nowPlaying').textContent = 'Samples cleared';
                document.getElementById('playingIndex').textContent = '--';
            }
        };

        // Parameter controls
        const params = ['trigRate', 'prob', 'mul', 'div', 'rprob', 'rmul', 'rdiv', 'divProb',
                        'hypersc', 'sp', 'pitchRand', 'slew', 'velvetDensity', 'velvetLevel', 'vol'];

        params.forEach(name => {
            const input = document.getElementById(name);
            const display = document.getElementById(name + 'Val');
            if (input && display) {
                input.oninput = () => {
                    const val = parseFloat(input.value);
                    if (name === 'slew') {
                        display.textContent = val.toFixed(3);
                    } else if (name === 'velvetDensity') {
                        display.textContent = Math.round(val);
                    } else {
                        display.textContent = Number.isInteger(val) ? val : val.toFixed(2);
                    }
                    if (workletNode) {
                        workletNode.port.postMessage({ type: 'param', name, value: val });
                    }
                };
            }
        });

        // Info panel
        if (typeof ER301InfoPanel !== 'undefined') {
            new ER301InfoPanel(document.body, {
                title: 'hyper301',
                author: 'mudlogger',
                origin: 'ER-301 Hyperscale Units',
                description: 'Extended hyperscale variant using the Konkrete FX Drills Kit2 (54 samples). Features the same dual Clocked Random Gate architecture as hyper scale, with the addition of Velvet Noise for textural crunch. The Drills kit provides industrial, glitchy, and lo-fi percussion sounds.',
                controls: [
                    { name: 'Trig Rate', range: '0.5-16 Hz', description: 'Main clock rate for triggering' },
                    { name: 'Prob', range: '0-1', description: 'Probability of main gate triggering' },
                    { name: 'Mul / Div', range: '1-8', description: 'Clock multiplier and divider' },
                    { name: 'R.Prob / R.Mul / R.Div', description: 'Secondary random gate parameters' },
                    { name: 'Div Prob', range: '0-1', description: 'Probability of using random gate vs main' },
                    { name: 'Scale', range: '0.25-4x', description: 'Overall pitch/time scaling' },
                    { name: 'Speed', range: '0.25-2x', description: 'Playback speed multiplier' },
                    { name: 'Pitch Rand', range: '0-1', description: 'Amount of random pitch variation' },
                    { name: 'Velvet Density', range: '100-10k', description: 'Impulses per second for velvet noise' },
                    { name: 'Velvet Level', range: '0-1', description: 'Velvet noise mix level' }
                ],
                tips: [
                    'The Drills kit has industrial, glitchy character',
                    'Velvet noise adds vinyl-like crackle and texture',
                    'High density velvet approaches white noise',
                    'Low density creates sparse impulse textures',
                    'Speed samples for IDM-style drill rhythms',
                    'Combine with pedalboard delays for depth',
                    'Import your own samples to replace the kit'
                ]
            });
        }
    </script>
</body>
</html>
