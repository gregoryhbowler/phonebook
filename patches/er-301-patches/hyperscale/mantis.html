    <script>
        const processorCode = `
// ============================================================================
// SLEW LIMITER
// ============================================================================
class SlewLimiter {
    constructor(time, sr) {
        this.sr = sr;
        this.setTime(time);
        this.value = 0;
    }

    setTime(time) {
        this.rate = 1 / (time * this.sr + 1);
    }

    process(target) {
        const diff = target - this.value;
        this.value += diff * this.rate;
        return this.value;
    }
}

// ============================================================================
// PINGABLE SCALED RANDOM
// ============================================================================
class PingableScaledRandom {
    constructor() {
        this.value = 0.5;
        this.target = 0.5;
        this.min = 0;
        this.max = 1;
    }

    ping() {
        this.target = this.min + Math.random() * (this.max - this.min);
    }

    setRange(min, max) {
        this.min = min;
        this.max = max;
    }

    process(slew) {
        this.value += (this.target - this.value) * slew;
        return this.value;
    }
}

// ============================================================================
// CLOCKED RANDOM GATE
// ============================================================================
class ClockedRandomGate {
    constructor(sr) {
        this.sr = sr;
        this.phase = 0;
        this.rate = 2;
        this.prob = 0.7;
        this.gateOpen = false;
    }

    setRate(r) { this.rate = Math.max(0.1, r); }
    setProb(p) { this.prob = p; }

    process() {
        this.phase += this.rate / this.sr;

        let triggered = false;
        if (this.phase >= 1) {
            this.phase -= 1;
            if (Math.random() < this.prob) {
                triggered = true;
                this.gateOpen = true;
            }
        }

        if (this.phase > 0.5) {
            this.gateOpen = false;
        }

        return triggered;
    }
}

// ============================================================================
// SINE LFO
// ============================================================================
class SineLFO {
    constructor(sr) {
        this.sr = sr;
        this.phase = 0;
        this.freq = 2;
    }

    setFreq(f) { this.freq = Math.max(0.01, f); }

    process() {
        this.phase += this.freq / this.sr;
        if (this.phase >= 1) this.phase -= 1;
        return Math.sin(this.phase * Math.PI * 2);
    }
}

// ============================================================================
// CLOCKED DOPPLER DELAY
// ============================================================================
class ClockedDopplerDelay {
    constructor(sr, maxTime) {
        this.sr = sr;
        this.buffer = new Float32Array(Math.ceil(maxTime * sr) + 1);
        this.writeIdx = 0;
        this.delayTime = 0.25;
        this.targetDelay = 0.25;
        this.feedback = 0.4;
        this.smoothing = 0.001;
    }

    setTime(t) { this.targetDelay = Math.max(0.01, t); }
    setFeedback(fb) { this.feedback = Math.min(0.95, fb); }

    process(input) {
        // Smooth delay time changes (doppler effect)
        this.delayTime += (this.targetDelay - this.delayTime) * this.smoothing;

        const delaySamples = this.delayTime * this.sr;
        let readIdx = this.writeIdx - delaySamples;
        if (readIdx < 0) readIdx += this.buffer.length;

        const idx0 = Math.floor(readIdx);
        const idx1 = (idx0 + 1) % this.buffer.length;
        const frac = readIdx - idx0;

        const delayed = this.buffer[idx0] * (1 - frac) + this.buffer[idx1] * frac;

        this.buffer[this.writeIdx] = input + delayed * this.feedback;
        this.writeIdx = (this.writeIdx + 1) % this.buffer.length;

        return delayed;
    }
}

// ============================================================================
// REVERB HELPER CLASSES
// ============================================================================
class ReverbDelayLine {
    constructor(maxDelay) { this.buffer = new Float32Array(maxDelay); this.maxDelay = maxDelay; this.writeIndex = 0; }
    write(sample) { this.buffer[this.writeIndex] = sample; this.writeIndex = (this.writeIndex + 1) % this.maxDelay; }
    read(delaySamples) { let r = this.writeIndex - Math.floor(delaySamples); if (r < 0) r += this.maxDelay; return this.buffer[r]; }
}
class OnePole {
    constructor(coeff = 0.99) { this.coeff = coeff; this.z1 = 0; }
    setFrequency(freq, sr) { this.coeff = Math.exp(-2 * Math.PI * freq / sr); }
    process(input) { this.z1 = input + this.coeff * (this.z1 - input); return this.z1; }
}
class AllpassSection {
    constructor(delaySamples, coeff) { this.delay = new ReverbDelayLine(delaySamples + 1); this.delaySamples = delaySamples; this.coeff = coeff; }
    process(input) { const delayed = this.delay.read(this.delaySamples); const output = -input * this.coeff + delayed; this.delay.write(input + delayed * this.coeff); return output; }
}
class DCBlocker {
    constructor() { this.x1 = 0; this.y1 = 0; this.R = 0.995; }
    process(x) { const y = x - this.x1 + this.R * this.y1; this.x1 = x; this.y1 = y; return y; }
}

// ============================================================================
// DATTORRO REVERB (with stability fixes)
// ============================================================================
class DattorroReverb {
    constructor(sr) {
        this.sr = sr;
        const baseDelay = sr / 29761;
        this.predelay = new ReverbDelayLine(Math.floor(sr * 0.1));
        this.predelayTime = Math.floor(0.019 * sr);
        this.inDiff1 = new AllpassSection(Math.floor(142 * baseDelay), 0.7);
        this.inDiff2 = new AllpassSection(Math.floor(107 * baseDelay), 0.7);
        this.inDiff3 = new AllpassSection(Math.floor(379 * baseDelay), 0.5);
        this.inDiff4 = new AllpassSection(Math.floor(277 * baseDelay), 0.5);
        this.decayDiff1L = new AllpassSection(Math.floor(672 * baseDelay), -0.6);
        this.delay1L = new ReverbDelayLine(Math.floor(4453 * baseDelay));
        this.damp1L = new OnePole(0.0001);
        this.decayDiff2L = new AllpassSection(Math.floor(1800 * baseDelay), 0.4);
        this.delay2L = new ReverbDelayLine(Math.floor(3720 * baseDelay));
        this.decayDiff1R = new AllpassSection(Math.floor(908 * baseDelay), -0.6);
        this.delay1R = new ReverbDelayLine(Math.floor(4217 * baseDelay));
        this.damp1R = new OnePole(0.0001);
        this.decayDiff2R = new AllpassSection(Math.floor(2656 * baseDelay), 0.4);
        this.delay2R = new ReverbDelayLine(Math.floor(3163 * baseDelay));
        this.inputFilter = new OnePole(0.9995);
        this.tankL = 0; this.tankR = 0;
        this.dcBlockL = new DCBlocker(); this.dcBlockR = new DCBlocker();
        this.decay = 0.5; this.mix = 0.5;
        this.delay1LTime = Math.floor(4453 * baseDelay);
        this.delay2LTime = Math.floor(3720 * baseDelay);
        this.delay1RTime = Math.floor(4217 * baseDelay);
        this.delay2RTime = Math.floor(3163 * baseDelay);
        this.bandwidth = 0.7; this.damping = 0.5;
    }
    setDecay(d) { this.decay = Math.max(0, Math.min(0.85, d * 0.85)); }
    setDamping(d) { const freq = 200 + 15000 * (1 - d); this.damp1L.setFrequency(freq, this.sr); this.damp1R.setFrequency(freq, this.sr); this.damping = d; }
    setBandwidth(bw) { this.inputFilter.coeff = 1 - bw; this.bandwidth = bw; }
    setMix(m) { this.mix = Math.max(0, Math.min(1, m)); }
    process(inL, inR) {
        let input = Math.max(-1, Math.min(1, (inL + inR) * 0.5));
        input = this.inputFilter.process(input);
        this.predelay.write(input);
        input = this.predelay.read(this.predelayTime);
        input = this.inDiff1.process(this.inDiff2.process(this.inDiff3.process(this.inDiff4.process(input))));
        let tankInL = input + this.dcBlockL.process(this.tankR) * this.decay;
        tankInL = this.decayDiff1L.process(tankInL);
        this.delay1L.write(tankInL);
        tankInL = this.damp1L.process(this.delay1L.read(this.delay1LTime));
        tankInL = this.decayDiff2L.process(tankInL);
        this.delay2L.write(tankInL);
        this.tankL = Math.tanh(this.delay2L.read(this.delay2LTime));
        let tankInR = input + this.dcBlockR.process(this.tankL) * this.decay;
        tankInR = this.decayDiff1R.process(tankInR);
        this.delay1R.write(tankInR);
        tankInR = this.damp1R.process(this.delay1R.read(this.delay1RTime));
        tankInR = this.decayDiff2R.process(tankInR);
        this.delay2R.write(tankInR);
        this.tankR = Math.tanh(this.delay2R.read(this.delay2RTime));
        const wetL = this.tankL * 0.6 + this.tankR * 0.4;
        const wetR = this.tankR * 0.6 + this.tankL * 0.4;
        return [inL * (1 - this.mix) + wetL * this.mix, inR * (1 - this.mix) + wetR * this.mix];
    }
}

// ============================================================================
// CPR COMPRESSOR
// ============================================================================
class CPR {
    constructor(sr) {
        this.sr = sr;
        this.envelope = 0;
        this.attackCoef = Math.exp(-1 / (sr * 0.005));
        this.releaseCoef = Math.exp(-1 / (sr * 0.1));
        this.threshold = 0.5;
        this.ratio = 4;
        this.makeupGain = 1.5;
    }

    process(input) {
        const inputLevel = Math.abs(input);

        if (inputLevel > this.envelope) {
            this.envelope = this.attackCoef * this.envelope + (1 - this.attackCoef) * inputLevel;
        } else {
            this.envelope = this.releaseCoef * this.envelope + (1 - this.releaseCoef) * inputLevel;
        }

        let gain = 1;
        if (this.envelope > this.threshold) {
            const excess = this.envelope - this.threshold;
            const compressed = excess / this.ratio;
            gain = (this.threshold + compressed) / this.envelope;
        }

        return input * gain * this.makeupGain;
    }
}

// ============================================================================
// MANTIS PROCESSOR
// ============================================================================
class MantisProcessor extends AudioWorkletProcessor {
    constructor() {
        super();
        this.sr = sampleRate;
        this.playing = false;
        this.samples = [];
        this.sampleNames = [];

        // Current sample
        this.currentSample = null;
        this.samplePosition = 0;
        this.sampleSpeed = 1;
        this.currentSampleIndex = -1;

        // Gate
        this.gate = new ClockedRandomGate(this.sr);
        this.autoMode = true;

        // LFO
        this.lfo = new SineLFO(this.sr);
        this.lfoValue = 0;

        // Pitch random
        this.pitchRandom = new PingableScaledRandom();
        this.pitchSlew = new SlewLimiter(0.05, this.sr);

        // Doppler delay
        this.delayL = new ClockedDopplerDelay(this.sr, 2);
        this.delayR = new ClockedDopplerDelay(this.sr, 2);

        // Reverb
        this.reverb = new DattorroReverb(this.sr);

        // CPR
        this.compressor = new CPR(this.sr);

        // Params
        this.params = {
            speed: 2,
            chance: 0.7,
            spread: 0.5,
            lfo: 0.5,
            lfoDepth: 0.3,
            lfoSpd: 2,
            delay: 0.25,
            fdk: 0.4,
            bw: 0.7,
            decay: 0.6,
            damp: 0.5,
            verb: 0.35,
            vol: 0.7
        };

        this.uiCounter = 0;

        this.port.onmessage = (e) => {
            if (e.data.type === 'start') this.playing = true;
            if (e.data.type === 'stop') this.playing = false;
            if (e.data.type === 'param') {
                this.params[e.data.name] = e.data.value;
            }
            if (e.data.type === 'auto') {
                this.autoMode = e.data.auto;
            }
            if (e.data.type === 'manualTrig') {
                this.triggerSample();
            }
            if (e.data.type === 'loadSamples') {
                this.samples = e.data.samples;
                this.sampleNames = e.data.names || [];
            }
            if (e.data.type === 'clearSamples') {
                this.samples = [];
                this.sampleNames = [];
                this.currentSample = null;
            }
        };
    }

    triggerSample() {
        if (this.samples.length === 0) return;

        const idx = Math.floor(Math.random() * this.samples.length);
        this.currentSample = this.samples[idx];
        this.currentSampleIndex = idx;
        this.samplePosition = 0;

        // Random pitch
        this.pitchRandom.ping();
        const pitchRange = this.params.spread;
        this.sampleSpeed = 0.5 + Math.random() * pitchRange + 0.5;

        this.port.postMessage({
            type: 'sampleTriggered',
            index: idx
        });
    }

    process(inputs, outputs, parameters) {
        const output = outputs[0];
        const outL = output[0];
        const outR = output[1];

        if (!this.playing) {
            outL.fill(0);
            outR.fill(0);
            return true;
        }

        // Update params
        this.gate.setRate(this.params.speed);
        this.gate.setProb(this.params.chance);
        this.lfo.setFreq(this.params.lfoSpd);
        this.delayL.setTime(this.params.delay);
        this.delayR.setTime(this.params.delay * 1.1);
        this.delayL.setFeedback(this.params.fdk);
        this.delayR.setFeedback(this.params.fdk);
        this.reverb.setBandwidth(this.params.bw);
        this.reverb.setDecay(this.params.decay);
        this.reverb.setDamping(this.params.damp);
        this.reverb.setMix(this.params.verb);

        let gateState = false;

        for (let i = 0; i < outL.length; i++) {
            // Auto trigger
            if (this.autoMode) {
                const trig = this.gate.process();
                gateState = this.gate.gateOpen;
                if (trig) {
                    this.triggerSample();
                }
            }

            // LFO
            this.lfoValue = this.lfo.process();
            const lfoMod = this.lfoValue * this.params.lfoDepth * this.params.lfo;

            // Sample playback with LFO modulation on speed
            let sampleOut = 0;
            if (this.currentSample) {
                const idx = Math.floor(this.samplePosition);
                if (idx >= 0 && idx < this.currentSample.length - 1) {
                    const frac = this.samplePosition - idx;
                    const s0 = this.currentSample[idx];
                    const s1 = this.currentSample[idx + 1];
                    sampleOut = s0 + frac * (s1 - s0);

                    // Apply LFO to playback speed
                    const modulatedSpeed = this.sampleSpeed * (1 + lfoMod * 0.5);
                    this.samplePosition += modulatedSpeed;
                }
            }

            // Stereo spread with LFO
            const spreadL = sampleOut * (1 + lfoMod * 0.3);
            const spreadR = sampleOut * (1 - lfoMod * 0.3);

            // Doppler delay
            const delayedL = this.delayL.process(spreadL);
            const delayedR = this.delayR.process(spreadR);

            let sigL = spreadL + delayedL * 0.5;
            let sigR = spreadR + delayedR * 0.5;

            // Reverb (includes wet/dry mix)
            [sigL, sigR] = this.reverb.process(sigL, sigR);

            // Compression
            sigL = this.compressor.process(sigL);
            sigR = this.compressor.process(sigR);

            // Volume and limit
            sigL *= this.params.vol;
            sigR *= this.params.vol;

            outL[i] = Math.tanh(sigL);
            outR[i] = Math.tanh(sigR);
        }

        // UI updates
        this.uiCounter++;
        if (this.uiCounter >= 256) {
            this.uiCounter = 0;
            this.port.postMessage({
                type: 'status',
                gate: gateState,
                lfo: this.lfoValue,
                auto: this.autoMode
            });
        }

        return true;
    }
}
