<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>07 - Pink Noise Bands</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../lib/effect-ui.css">
    <script src="../lib/pedalboard-effects.js"></script>
    <script src="../lib/effect-ui.js"></script>
    <script type="module" src="../lib/phonebook-features.js"></script>
</head>
<body>
    <div class="patch-page">
        <header class="patch-header">
            <a href="../index.html" class="back-link">&larr; Back</a>
            <div class="patch-info">
                <h1>07 - Pink Noise Bands</h1>
                <p>Splayed bandpass-filtered pink noise with LFNoise2 modulation</p>
            </div>
        </header>

        <main class="patch-content">
            <div class="visualizer-container">
                <canvas id="visualizer"></canvas>
            </div>

            <div class="controls">
                <button class="play-btn" id="playBtn">&#9654;</button>
            </div>

            <div class="param-controls">
                <div class="param-group">
                    <label>Brightness</label>
                    <input type="range" id="brightness" min="100" max="600" value="300" step="10">
                    <span class="param-value" id="brightnessVal">300</span>
                </div>
                <div class="param-group">
                    <label>Q</label>
                    <input type="range" id="filterQ" min="0.05" max="0.5" value="0.15" step="0.01">
                    <span class="param-value" id="filterQVal">0.15</span>
                </div>
                <div class="param-group">
                    <label>Mod Depth</label>
                    <input type="range" id="modDepth" min="1" max="10" value="5" step="0.5">
                    <span class="param-value" id="modDepthVal">5.0</span>
                </div>
            </div>

            <div class="code-block">
                <code>play{Splay.ar({|i|f=1.9**i/128;BPF.ar(PinkNoise.ar(1!2),4**LFNoise2.kr(1.2**i/16)*300,0.15)*(5**LFNoise2.ar(f)/(i+8)*20)}!15)}</code>
            </div>

            <p class="status" id="status">Click play to start</p>

            <div id="pedalboard-container" class="pedalboard-container"></div>
        </main>

        <nav class="nav-links">
            <a href="patch-06-tuple-patterns.html">&larr; Previous</a>
            <a href="patch-08-feedback-dust.html">Next &rarr;</a>
        </nav>
    </div>

    <script>
        const processorCode = `
class PinkNoiseBandsProcessor extends AudioWorkletProcessor {
    constructor() {
        super();
        this.sampleRate = sampleRate;

        this.brightness = 300;
        this.filterQ = 0.15;
        this.modDepth = 5;

        // Pink noise generator state (Voss-McCartney algorithm)
        this.pinkRows = new Float32Array(16);
        this.pinkRunningSum = 0;
        this.pinkIndex = 0;

        // 15 filter bands
        this.bands = [];
        for (let i = 0; i < 15; i++) {
            const f = Math.pow(1.9, i) / 128;
            this.bands.push({
                // LFNoise2 for frequency modulation (control rate)
                lfnoise2FreqPhase: Math.random(),
                lfnoise2FreqValue: Math.random() * 2 - 1,
                lfnoise2FreqTarget: Math.random() * 2 - 1,
                lfnoise2FreqPrev: Math.random() * 2 - 1,
                lfnoise2FreqPrev2: Math.random() * 2 - 1,

                // LFNoise2 for amplitude modulation (audio rate)
                lfnoise2AmpPhase: Math.random(),
                lfnoise2AmpValue: Math.random() * 2 - 1,
                lfnoise2AmpTarget: Math.random() * 2 - 1,
                lfnoise2AmpPrev: Math.random() * 2 - 1,
                lfnoise2AmpPrev2: Math.random() * 2 - 1,

                // BPF state (stereo)
                bpfState: [
                    { x1: 0, x2: 0, y1: 0, y2: 0 },
                    { x1: 0, x2: 0, y1: 0, y2: 0 }
                ],

                freqRate: Math.pow(1.2, i) / 16,
                ampRate: f,
                pan: (i / 14) * 2 - 1,
                i: i
            });
        }

        this.port.onmessage = (e) => {
            if (e.data.brightness !== undefined) this.brightness = e.data.brightness;
            if (e.data.filterQ !== undefined) this.filterQ = e.data.filterQ;
            if (e.data.modDepth !== undefined) this.modDepth = e.data.modDepth;
        };
    }

    // Generate pink noise sample
    pinkNoise() {
        const k = this.pinkIndex;
        this.pinkIndex = (this.pinkIndex + 1) % 16;

        // Find the number of trailing zeros
        let numZeros = 0;
        let n = k;
        while (n > 0 && (n & 1) === 0) {
            numZeros++;
            n >>= 1;
        }

        // Update the corresponding row
        this.pinkRunningSum -= this.pinkRows[numZeros];
        this.pinkRows[numZeros] = Math.random() * 2 - 1;
        this.pinkRunningSum += this.pinkRows[numZeros];

        return (this.pinkRunningSum + Math.random() * 2 - 1) / 8;
    }

    // Cubic interpolation for LFNoise2
    cubicInterp(phase, prev2, prev, curr, next) {
        const c0 = prev;
        const c1 = 0.5 * (curr - prev2);
        const c2 = prev2 - 2.5 * prev + 2 * curr - 0.5 * next;
        const c3 = 0.5 * (next - prev2) + 1.5 * (prev - curr);
        return ((c3 * phase + c2) * phase + c1) * phase + c0;
    }

    process(inputs, outputs, parameters) {
        const output = outputs[0];
        const left = output[0];
        const right = output[1];

        if (!left) return true;

        for (let s = 0; s < left.length; s++) {
            // Generate pink noise (stereo)
            const noiseL = this.pinkNoise();
            const noiseR = this.pinkNoise();

            let sumL = 0;
            let sumR = 0;

            for (let b = 0; b < 15; b++) {
                const band = this.bands[b];

                // Update LFNoise2 for frequency modulation
                band.lfnoise2FreqPhase += band.freqRate / this.sampleRate;
                if (band.lfnoise2FreqPhase >= 1) {
                    band.lfnoise2FreqPhase -= 1;
                    band.lfnoise2FreqPrev2 = band.lfnoise2FreqPrev;
                    band.lfnoise2FreqPrev = band.lfnoise2FreqValue;
                    band.lfnoise2FreqValue = band.lfnoise2FreqTarget;
                    band.lfnoise2FreqTarget = Math.random() * 2 - 1;
                }
                const freqMod = this.cubicInterp(
                    band.lfnoise2FreqPhase,
                    band.lfnoise2FreqPrev2,
                    band.lfnoise2FreqPrev,
                    band.lfnoise2FreqValue,
                    band.lfnoise2FreqTarget
                );

                // Update LFNoise2 for amplitude modulation
                band.lfnoise2AmpPhase += band.ampRate / this.sampleRate;
                if (band.lfnoise2AmpPhase >= 1) {
                    band.lfnoise2AmpPhase -= 1;
                    band.lfnoise2AmpPrev2 = band.lfnoise2AmpPrev;
                    band.lfnoise2AmpPrev = band.lfnoise2AmpValue;
                    band.lfnoise2AmpValue = band.lfnoise2AmpTarget;
                    band.lfnoise2AmpTarget = Math.random() * 2 - 1;
                }
                const ampMod = this.cubicInterp(
                    band.lfnoise2AmpPhase,
                    band.lfnoise2AmpPrev2,
                    band.lfnoise2AmpPrev,
                    band.lfnoise2AmpValue,
                    band.lfnoise2AmpTarget
                );

                // Calculate filter frequency: 4^freqMod * brightness
                const filterFreq = Math.pow(4, freqMod) * this.brightness;
                const clampedFreq = Math.max(20, Math.min(filterFreq, this.sampleRate * 0.4));

                // BPF coefficients
                const omega = 2 * Math.PI * clampedFreq / this.sampleRate;
                const sinOmega = Math.sin(omega);
                const cosOmega = Math.cos(omega);
                const alpha = sinOmega / (2 / this.filterQ);

                const b0 = alpha;
                const b1 = 0;
                const b2 = -alpha;
                const a0 = 1 + alpha;
                const a1 = -2 * cosOmega;
                const a2 = 1 - alpha;

                // Calculate amplitude: 5^ampMod / (i+8) * modDepth * 4
                const amp = Math.pow(this.modDepth, ampMod) / (band.i + 8) * 20;

                // Apply BPF to noise (stereo)
                for (let ch = 0; ch < 2; ch++) {
                    const noise = ch === 0 ? noiseL : noiseR;
                    const state = band.bpfState[ch];

                    const filtered = (b0/a0) * noise + (b1/a0) * state.x1 + (b2/a0) * state.x2
                                   - (a1/a0) * state.y1 - (a2/a0) * state.y2;

                    state.x2 = state.x1;
                    state.x1 = noise;
                    state.y2 = state.y1;
                    state.y1 = filtered;

                    // Splay panning
                    const panL = Math.cos((band.pan + 1) * Math.PI / 4);
                    const panR = Math.sin((band.pan + 1) * Math.PI / 4);

                    if (ch === 0) sumL += filtered * amp * panL;
                    else sumR += filtered * amp * panR;
                }
            }

            left[s] = Math.tanh(sumL * 0.1);
            if (right) right[s] = Math.tanh(sumR * 0.1);
        }

        return true;
    }
}

registerProcessor('pink-noise-bands-processor', PinkNoiseBandsProcessor);
`;

        let audioContext = null;
        let workletNode = null;
        let analyser = null;
        let isPlaying = false;
        let pedalboard = null;

        let stickyHeader = null;
        let modMatrixUI = null;
        let midiLearn = null;
        let modMatrix = null;
        const playBtn = document.getElementById('playBtn');
        const status = document.getElementById('status');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        const params = ['brightness', 'filterQ', 'modDepth'];
        params.forEach(param => {
            const input = document.getElementById(param);
            const display = document.getElementById(param + 'Val');
            input.addEventListener('input', () => {
                const val = parseFloat(input.value);
                display.textContent = val.toFixed(param === 'brightness' ? 0 : 2);
                if (workletNode) {
                    workletNode.port.postMessage({ [param]: val });
                }
            });
        });

        
        // Wait for phonebook features to load (or timeout after 2 seconds)
        const featuresLoaded = new Promise(resolve => {
            if (typeof StickyHeader !== 'undefined') {
                resolve(true);
            } else {
                window.addEventListener('phonebook-features-loaded', () => resolve(true), { once: true });
                setTimeout(() => resolve(false), 2000);
            }
        });

        async function initAudio() {
            // Wait for features to load first
            await featuresLoaded;

            audioContext = new AudioContext();
            const blob = new Blob([processorCode], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            await audioContext.audioWorklet.addModule(url);
            URL.revokeObjectURL(url);

            workletNode = new AudioWorkletNode(audioContext, 'pink-noise-bands-processor');

            // Initialize pedalboard and route audio through it
            pedalboard = new PedalboardUI(
                document.getElementById('pedalboard-container'),
                audioContext
            );
            const fxNode = await pedalboard.init();
            pedalboard.connect(workletNode);
            fxNode.connect(audioContext.destination);

            // Initialize features if phonebook-features.js is loaded
            if (typeof StickyHeader !== 'undefined') {
                stickyHeader = new StickyHeader({
                    patchName: '07-pink-noise-bands',
                    patchId: 'patch-07-pink-noise-bands'
                });
                await stickyHeader.init();
                await stickyHeader.initRecorder(audioContext, fxNode || workletNode, audioContext.destination);
            }

            if (typeof getMidiLearn !== 'undefined') {
                midiLearn = await getMidiLearn('patch-07-pink-noise-bands');
            }

            if (typeof getModulationMatrix !== 'undefined') {
                modMatrix = getModulationMatrix();
                modMatrixUI = new ModMatrixUI(
                    document.querySelector('.patch-content'),
                    { modMatrix: modMatrix }
                );
                modMatrixUI.init();
            }

            // Auto-register all sliders for MIDI Learn and Mod Matrix
            if (typeof autoRegisterControls !== 'undefined') {
                await autoRegisterControls({
                    patchId: 'patch-07-pink-noise-bands',
                    prefix: 'bands',
                    modMatrixUI: modMatrixUI
                });
            }

            // Also connect to analyser for visualization
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;
            analyser.smoothingTimeConstant = 0.85;
            fxNode.connect(analyser);

            params.forEach(param => {
                const val = parseFloat(document.getElementById(param).value);
                workletNode.port.postMessage({ [param]: val });
            });
        }

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        function drawVisualizer() {
            if (!analyser) return;
            const rect = canvas.parentElement.getBoundingClientRect();
            const width = rect.width;
            const height = rect.height;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            ctx.fillStyle = 'rgba(18, 18, 26, 0.2)';
            ctx.fillRect(0, 0, width, height);

            // Spectral bands visualization
            const numBands = 15;
            const bandWidth = width / numBands;

            for (let i = 0; i < numBands; i++) {
                // Map to frequency bins (logarithmic)
                const startBin = Math.floor(Math.pow(i / numBands, 2) * bufferLength);
                const endBin = Math.floor(Math.pow((i + 1) / numBands, 2) * bufferLength);

                let avg = 0;
                for (let j = startBin; j < endBin; j++) {
                    avg += dataArray[j];
                }
                avg /= (endBin - startBin) || 1;

                const h = (avg / 255) * height;
                const hue = 240 + (i / numBands) * 60;

                ctx.fillStyle = `hsla(${hue}, 60%, 50%, 0.7)`;
                ctx.fillRect(i * bandWidth + 2, height - h, bandWidth - 4, h);
            }

            if (isPlaying) requestAnimationFrame(drawVisualizer);
        }

        playBtn.addEventListener('click', async () => {
            if (!audioContext) {
                await initAudio();
                resizeCanvas();
            }

            if (isPlaying) {
                audioContext.suspend();
                playBtn.innerHTML = '&#9654;';
                playBtn.classList.remove('playing');
                status.textContent = 'Paused';
                status.classList.remove('active');
                isPlaying = false;
                if (modMatrix) modMatrix.stop();
            } else {
                await audioContext.resume();
                playBtn.innerHTML = '&#10074;&#10074;';
                playBtn.classList.add('playing');
                status.textContent = 'Playing';
                status.classList.add('active');
                isPlaying = true;
                if (modMatrix) modMatrix.start();
                drawVisualizer();
            }
        });

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
